<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PICO 6DoF</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: #fff;
      background: rgb(56, 56, 62);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      align-items: center;
      width: 100%;
      height: 100vh;
      background-color: rgb(43, 41, 40);
      margin: 0;
      padding: 0;
      position: relative;
      z-index: 3;
    }

    .drop-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .spark-canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /*
     * Normal playback: crop ~5% inset on each side (90% aperture) so subject reads larger.
     * XR / AR DOM overlay uses body.is-immersive-ar — skip so headset scale stays consistent.
     */
    body:not(.is-immersive-ar) .viewer-window .window-frame > .spark-canvas {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(calc(100 / 90));
      transform-origin: center center;
    }

    body:not(.is-immersive-ar) .viewer-window .window-frame > .viewer-preview-overlay {
      transform: scale(calc(100 / 90));
      transform-origin: center center;
    }

    .invisible {
      display: none;
    }

    .canvas-container {
      position: fixed;
      inset: 0;
      background: rgb(56, 56, 62);
      z-index: 2;
    }

    .logo {
      position: absolute;
      top: clamp(4px, 1vw, 10px);
      left: clamp(4px, 1vw, 10px);
      z-index: 2;
      background: rgba(255, 255, 255, 0.2);
      padding: clamp(4px, 0.9vw, 6px) clamp(6px, 1.2vw, 8px);
      border-radius: clamp(8px, 1.4vw, 10px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .logo img {
      width: clamp(52px, 9vw, 80px);
      max-width: 24vw;
      height: auto;
      display: block;
    }

    .scene-title-overlay {
      position: absolute;
      top: clamp(4px, 1vw, 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      max-width: min(70vw, 680px);
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(20, 20, 20, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.94);
      font-size: clamp(0.75rem, 1.4vw, 0.9rem);
      line-height: 1.2;
      text-align: center;
      white-space: normal;
      overflow-wrap: anywhere;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease;
    }

    .scene-title-overlay.has-text {
      opacity: 1;
      visibility: visible;
    }

    .viewer-close-button {
      position: absolute;
      top: clamp(4px, 1vw, 10px);
      right: clamp(4px, 1vw, 10px);
      z-index: 2;
      width: clamp(28px, 3.2vw, 34px);
      height: clamp(28px, 3.2vw, 34px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      background: rgba(20, 20, 20, 0.58);
      color: rgba(255, 255, 255, 0.95);
      font-size: clamp(0.92rem, 2vw, 1.1rem);
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .viewer-close-button:hover {
      background: rgba(42, 42, 42, 0.75);
    }

    .debug-panel {
      position: absolute;
      bottom: clamp(6px, 1.2vw, 10px);
      right: clamp(6px, 1.2vw, 10px);
      z-index: 3;
      background: rgba(10, 10, 10, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 7px 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      font-size: 0.72rem;
      font-family: ui-monospace, 'Courier New', monospace;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.7;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      min-width: 148px;
    }

    .controls .ar-button.is-active {
      background: rgba(255, 255, 255, 0.22) !important;
      color: #fff !important;
    }

    /* AR: no matte bezel or rounded “TV” frame — passthrough / page shows through */
    body.is-immersive-ar .logo,
    body.is-immersive-ar .scene-title-overlay,
    body.is-immersive-ar .viewer-close-button,
    body.is-immersive-ar .debug-panel,
    body.is-immersive-ar .viewer-window .window-frame,
    body.is-immersive-ar .scene-strip,
    body.is-immersive-ar .scene-card,
    body.is-immersive-ar .scene-card-thumb {
      border: none !important;
    }

    body.is-immersive-ar .viewer-window .window-frame {
      background: transparent !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .hero-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero-title {
      margin: 0 0 1.5rem 0;
      font-size: clamp(1.45rem, 2.8vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.95);
      text-align: center;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    .hero-logo img {
      width: 350px;
      height: auto;
      margin-bottom: 1rem;
    }

    .url-select,
    .frame-limit-select,
    .drop-zone {
      width: 100%;
      max-width: 300px;
      margin: 0.5rem auto;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.7rem;
      text-align: center;
    }

    .drop-zone {
      max-width: 760px;
      padding-top: 4rem;
      padding-bottom: 4rem;
    }

    .url-select {
      background-color: rgb(47, 47, 47);
      border: none;
      color: #fff;
      text-align: center;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      appearance: none;
      -webkit-appearance: none;
      text-align-last: center;
      -moz-text-align-last: center;
      display: block;
    }

    .url-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .language-row {
      width: 100%;
      max-width: 760px;
      margin: 0.2rem auto 0.45rem auto;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
      box-sizing: border-box;
    }

    .language-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .language-label {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      white-space: nowrap;
    }

    .language-select {
      width: auto;
      min-width: 108px;
      max-width: 160px;
      margin: 0;
      padding: 0.45rem 0.65rem;
      font-size: 0.72rem;
      border-radius: 8px;
      text-align-last: center;
      -moz-text-align-last: center;
    }

    .url-row {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0.5rem auto;
    }

    .url-row .url-select,
    .url-row .frame-limit-wrap,
    .url-row .cache-all-button {
      width: 100%;
      max-width: none;
      margin: 0;
    }

    .scene-preview-grid {
      --scene-card-w: 182px;
      width: 100%;
      max-width: 760px;
      margin: 0.35rem auto 0.5rem auto;
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      justify-content: flex-start;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-top: 2px;
      padding-bottom: 4px;
      scroll-behavior: smooth;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
    }

    .scene-preview-status {
      width: 100%;
      border-radius: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      background: rgba(47, 47, 47, 0.78);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.72rem;
      text-align: center;
      padding: 0.85rem 0.7rem;
    }

    .scene-card {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(47, 47, 47, 0.95);
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      text-align: left;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 0 0 var(--scene-card-w);
      width: var(--scene-card-w);
      min-width: var(--scene-card-w);
      max-width: var(--scene-card-w);
      box-sizing: border-box;
      overflow: hidden;
      transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.15s ease;
    }

    .scene-card:hover {
      background: rgb(58, 58, 58);
      border-color: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }

    .scene-card.is-selected {
      border-color: rgba(122, 205, 152, 0.95);
      box-shadow: 0 0 0 1px rgba(122, 205, 152, 0.35) inset;
    }

    .scene-card.is-loading {
      opacity: 0.78;
      cursor: default;
    }

    .scene-card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      flex-shrink: 0;
      border-radius: 7px;
      overflow: hidden;
      background: rgb(35, 35, 35);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-card-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* Same thumb band as 16:9; portrait preview is a centered 9:16 strip */
    .scene-card-thumb.is-portrait img {
      width: calc(100% * 9 / 16 * 9 / 16);
      height: 100%;
      max-width: 100%;
      object-fit: cover;
      object-position: center;
    }

    .scene-card-thumb-fallback {
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.02em;
    }

    .scene-card-title {
      font-size: 0.74rem;
      line-height: 1.25;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      word-break: break-word;
      min-width: 0;
      width: 100%;
    }

    .frame-limit-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 6px;
      background-color: rgb(47, 47, 47);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      overflow: hidden;
    }

    .frame-limit-select {
      background-color: transparent;
      border: none;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      display: block;
      width: 100%;
      text-align: center;
      text-align-last: center;
      -moz-text-align-last: center;
      padding: 0.75rem;
      margin: 0;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .cache-all-button {
      width: 100%;
      max-width: 760px;
      margin: 0.5rem auto 0.25rem auto;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      background-color: rgb(60, 60, 60);
      color: #fff;
      font-size: 0.7rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .url-row .cache-all-button {
      height: 100%;
      min-height: 42px;
      margin: 0;
      max-width: none;
      padding: 0.75rem 0.6rem;
      border-radius: 6px;
    }

    .cache-all-progress {
      position: absolute;
      inset: 0;
      width: 0%;
      background: rgba(255, 255, 255, 0.18);
      transition: width 0.18s ease;
      pointer-events: none;
    }

    .cache-all-button.is-caching .cache-all-progress {
      background-image: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0.12) 0%,
        rgba(255, 255, 255, 0.28) 35%,
        rgba(255, 255, 255, 0.12) 70%
      );
      background-size: 200% 100%;
      animation: cacheProgressSweep 1s linear infinite;
    }

    @keyframes cacheProgressSweep {
      from {
        background-position: 200% 0;
      }
      to {
        background-position: 0 0;
      }
    }

    .cache-all-label {
      position: relative;
      z-index: 1;
    }

    .cache-all-label-text {
      display: inline;
    }

    .cache-all-label-dots {
      display: inline-block;
      width: 1.6em;
      text-align: left;
    }

    .cache-all-button:hover {
      background-color: rgb(90, 90, 90);
    }

    .cache-all-button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .drop-zone {
      border: 1px dashed #666;
      color: rgb(89, 89, 89);
      background-color: rgb(47, 47, 47);
      cursor: pointer;
    }

    .drop-zone.dragover {
      border: 1px dashed #aaa;
      color: rgb(170, 170, 170);
    }

    @media (min-width: 600px) {
      .url-select,
      .frame-limit-wrap,
      .frame-limit-select,
      .drop-zone {
        font-size: 0.77rem;
      }

      .cache-all-button {
        font-size: 0.77rem;
      }
    }

    .hidden {
      display: none;
    }

    .author-credit {
      margin-top: 10px;
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.68);
      line-height: 1.2;
      letter-spacing: 0.01em;
      text-align: center;
      user-select: none;
    }

    .author-credit-viewer {
      width: 100%;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.35);
    }

    .author-credit-import {
      margin-top: 12px;
    }

    .controls {
      --actions-row-width-pix: 9999px;
      --compact-action-width-pix: 88px;
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(28, 28, 28, 0.7);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      z-index: 2;
      width: 100%;
      pointer-events: auto;
      transition: opacity 0.3s ease;
    }

    .controls.is-disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .controls .controls-left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .controls .controls-right {
      min-width: 0;
      flex-shrink: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: nowrap;
      width: auto;
      max-width: 100%;
      gap: 8px;
      row-gap: 8px;
      box-sizing: border-box;
    }

    .controls .controls-right-primary {
      order: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      align-content: flex-end;
      justify-content: flex-end;
      gap: 6px 8px;
      min-width: 0;
      width: auto;
      max-width: 100%;
      flex-shrink: 1;
      box-sizing: border-box;
    }

    .controls .controls-actions-row {
      order: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      flex-shrink: 0;
      width: auto;
      min-width: 0;
      box-sizing: border-box;
    }

    .controls .controls-right > * {
      min-width: 0;
    }

    .controls .scene-nav-button {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      padding: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.7em;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .controls .scene-nav-button.is-visible {
      display: inline-flex;
    }

    .controls .scene-nav-button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .controls .scene-nav-button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .controls .play-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
      background: rgba(255, 255, 255, 0.15);
    }

    .controls .caching-percent {
      display: none;
      min-width: 44px;
      font-size: 0.8em;
      color: rgba(255, 255, 255, 0.8);
      font-variant-numeric: tabular-nums;
      text-align: left;
    }

    .controls .caching-percent.is-visible {
      display: inline-block;
    }

    .controls .play-toggle.is-loading {
      cursor: default;
      opacity: 0.7;
    }

    .controls .play-toggle .loading-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      animation: spin 0.9s linear infinite;
    }

    .controls .play-toggle.is-loading .play-icon {
      display: none;
    }

    .controls .play-toggle.is-loading .loading-spinner {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .controls .play-toggle .play-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      position: relative;
      color: transparent;
      font-size: 0;
      line-height: 0;
    }

    .controls .play-toggle .play-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-42%, -50%);
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid #fff;
    }

    .controls .play-toggle.is-playing .play-icon::before,
    .controls .play-toggle.is-playing .play-icon::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 4px;
      height: 12px;
      border-radius: 1px;
      background: #fff;
      transform: translateY(-50%);
    }

    .controls .play-toggle.is-playing .play-icon::before {
      left: 4px;
      border: none;
    }

    .controls .play-toggle.is-playing .play-icon::after {
      right: 4px;
    }

    .controls .progress-wrap {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-width: 0;
    }

    .controls .fov-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
    }

    .controls .fov-label {
      font-size: 0.8em;
      color: rgba(255, 255, 255, 0.7);
      white-space: nowrap;
    }

    .controls .fov-value {
      min-width: 38px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85em;
    }

    .controls .fov-slider {
      width: 90px;
      accent-color: #fff;
    }

    .controls .time {
      font-size: 0.82em;
      color: rgba(255, 255, 255, 0.7);
      min-width: 44px;
      text-align: center;
    }

    .controls .progress {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
    }

    .controls .progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.15);
      cursor: pointer;
    }

    .controls .progress::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }

    .viewer-window {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      pointer-events: none;
      --viewer-window-padding: clamp(12px, 2vw, 28px);
      --viewer-aspect-w: 16;
      --viewer-aspect-h: 9;
      padding: var(--viewer-window-padding);
    }

    .viewer-window .viewer-stack {
      container-type: inline-size;
      container-name: viewer-stack;
      width: min(92vw, 1220px, calc(min(86dvh, 760px) * var(--viewer-aspect-w) / var(--viewer-aspect-h)));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin: auto;
      max-height: calc(100dvh - (var(--viewer-window-padding) * 2));
      pointer-events: auto;
    }

    .viewer-window .window-frame {
      position: relative;
      width: 100%;

    function t(key, vars = {}) {
      const table = I18N_TEXT[UI_LANG] || I18N_TEXT.en;
      const fallback = I18N_TEXT.en;
      const template = table[key] ?? fallback[key] ?? key;
      return String(template).replace(/\{(\w+)\}/g, (_, token) => {
        if (Object.prototype.hasOwnProperty.call(vars, token)) {
          return String(vars[token]);
        }
        return `{${token}}`;
      });
    }

    function localizeSceneName(rawName) {
      const key = String(rawName || '').trim();
      if (!key) return '';
      const entry = SCENE_NAME_I18N[key];
      if (!entry) return key;
      return entry[UI_LANG] || entry.en || key;
    }

    function resolveSceneDirectoryKey(rawName) {
      const name = String(rawName || '').trim();
      if (!name) return '';
      if (Object.prototype.hasOwnProperty.call(SCENE_NAME_I18N, name)) return name;
      for (const [key, entry] of Object.entries(SCENE_NAME_I18N)) {
        if (!entry || typeof entry !== 'object') continue;
        if (entry.en === name || entry.zh === name) return key;
      }
      return name;
    }

    /** Map i18n display folder segments back to real on-disk names (e.g. /TikTok Dance/ or /TikTok%20Dance/ → /TikTok_Dance/). */
    function fixLocalizedFolderSegmentInUrl(url) {
      let s = String(url || '');
      for (const [key, entry] of Object.entries(SCENE_NAME_I18N)) {
        if (!entry || typeof entry !== 'object') continue;
        for (const label of [entry.en, entry.zh]) {
          if (!label || label === key) continue;
          const plain = `/${label}/`;
          const encoded = `/${label.replace(/ /g, '%20')}/`;
          if (s.includes(encoded)) s = s.split(encoded).join(`/${key}/`);
          if (s.includes(plain)) s = s.split(plain).join(`/${key}/`);
        }
      }
      return s;
    }

      textEls.forEach((el) => {
        const key = el.dataset.i18nKey;
        if (!key) return;
        el.textContent = t(key);
      });

      const ariaEls = document.querySelectorAll('[data-i18n-aria-label]');
      ariaEls.forEach((el) => {
        const key = el.dataset.i18nAriaLabel;
        if (!key) return;
        el.setAttribute('aria-label', t(key));
      });

      const titleEls = document.querySelectorAll('[data-i18n-title]');
      titleEls.forEach((el) => {
        const key = el.dataset.i18nTitle;
        if (!key) return;
        el.setAttribute('title', t(key));
      });

      document.querySelectorAll('option[data-i18n-key]').forEach((el) => {
        const key = el.dataset.i18nKey;
        if (!key) return;
        el.textContent = t(key);
      });
    }

    const sparkCanvasEl = document.querySelector(".spark-canvas");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({canvas: sparkCanvasEl, powerPreference: 'high-performance', alpha: true});
    const frameEl = document.querySelector('.window-frame');
    const width = frameEl.clientWidth;
    const height = frameEl.clientHeight;

    /** Cap HiDPI multiplier so 3× phones do not tank FPS; 2× matches most “retina” class displays. */
    const RENDERER_PIXEL_RATIO_CAP = 2;

    function getClampedDevicePixelRatio() {
      return Math.min(window.devicePixelRatio || 1, RENDERER_PIXEL_RATIO_CAP);
    }

    renderer.setPixelRatio(getClampedDevicePixelRatio());
    renderer.setSize(width, height, false);
    const XR_FRAMEBUFFER_SCALE_FACTOR = 1.0;
    renderer.xr.setFramebufferScaleFactor(XR_FRAMEBUFFER_SCALE_FACTOR);

    // VR mode support
    const localFrame = new THREE.Group();
    scene.add(localFrame);
    const XR_SCENE_SCALE = 0.6;

    // Spark default is sqrt(8); sqrt(5) truncates Gaussians sooner (softer / less detail vs gsplat-style viewers).
    const SPLAT_MAX_STD_DEV = Math.sqrt(8);
    const spark = new SparkRenderer({ renderer, maxStdDev: SPLAT_MAX_STD_DEV });
    localFrame.add(spark);
    scene.add(camera);

    const vrButton = document.createElement('button');
    vrButton.id = 'VRButton';
    vrButton.style.display = 'none';

    let pendingRequestedXrMode = null;
    let pendingRequestedXrModeAtMs = 0;
    function rememberRequestedXrMode(mode) {
      pendingRequestedXrMode = mode;
      pendingRequestedXrModeAtMs = Date.now();
    }

    vrButton.addEventListener('click', () => {
      rememberRequestedXrMode('immersive-vr');
    });

    new SparkXr({
      renderer,
      element: vrButton,
      mode: 'vr',
      frameBufferScaleFactor: XR_FRAMEBUFFER_SCALE_FACTOR,
      sessionInit: {
        optionalFeatures: ['hand-tracking'],
      },
      button: {
        enterVrText: t('enterVr'),
        exitVrText: t('exitVr'),
      },
      onReady: (supported) => {
        vrButton.style.display = supported ? '' : 'none';
        vrButton.setAttribute('aria-hidden', supported ? 'false' : 'true');
      },
    });

    const DEFAULT_WIN_W = 1.61568, DEFAULT_WIN_H = 0.90882;  // window opening in world meters (-15%)
    let winW = DEFAULT_WIN_W;
    let winH = DEFAULT_WIN_H;
    const VR_TARGET_VISIBLE_AREA = 0.8;
    const VR_TARGET_VISIBLE_AXIS = Math.sqrt(VR_TARGET_VISIBLE_AREA);
    const VR_MIN_WIN_W = 0.9;
    const VR_MAX_WIN_W = 3.0;
    const VR_MIN_WIN_H = 0.5;
    const VR_MAX_WIN_H = 1.8;
    const VIEWER_ASPECT_STORAGE_KEY = 'pico-viewer-window-aspect';
    const VIEWER_ASPECT_MODES = {
      '16:9': { cssW: 16, cssH: 9 },
      '1:1': { cssW: 1, cssH: 1 },
      '9:16': { cssW: 9, cssH: 16 },
    };

    function normalizeViewerAspectMode(raw) {
      const v = String(raw ?? '').trim();
      if (v === '1:1' || v === '1/1') return '1:1';
      if (v === '9:16' || v === '9/16') return '9:16';
      return '16:9';
    }

    let viewerAspectMode = '16:9';
    try {
      viewerAspectMode = normalizeViewerAspectMode(localStorage.getItem(VIEWER_ASPECT_STORAGE_KEY));
    } catch {
    }

    function getViewerAspectRatioNumber() {
      const m = VIEWER_ASPECT_MODES[viewerAspectMode] || VIEWER_ASPECT_MODES['16:9'];
      return m.cssW / m.cssH;
    }

    function getDefaultVrWindowDimensions() {
      const area = DEFAULT_WIN_W * DEFAULT_WIN_H;
      const r = getViewerAspectRatioNumber();
      return { w: Math.sqrt(area * r), h: Math.sqrt(area / r) };
    }

    function syncViewerWindowAspectCss() {
      const m = VIEWER_ASPECT_MODES[viewerAspectMode] || VIEWER_ASPECT_MODES['16:9'];
      const vw = document.querySelector('.viewer-window');
      if (vw) {
        vw.style.setProperty('--viewer-aspect-w', String(m.cssW));
        vw.style.setProperty('--viewer-aspect-h', String(m.cssH));
      }
    }

    const AVP_VR_WINDOW_Y_OFFSET = 1.2;
    let isCurrentXrSessionAvp = false;

    function sendClientLog(payload) {
      fetch('/api/client-log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
        keepalive: true,
      }).catch(() => {
      });
    }

    function isLikelyAppleVisionProSession(xrSession) {
      const ua = navigator.userAgent || '';
      const uaBrands = Array.isArray(navigator.userAgentData?.brands)
        ? navigator.userAgentData.brands.map((entry) => entry?.brand || '').join(' ')
        : '';
      const hasVisionHint = /visionos|apple\s*vision\s*pro|\bvision\b/i.test(`${ua} ${uaBrands}`);
      if (hasVisionHint) return true;

      const isAppleBrowser = /apple/i.test(navigator.vendor || '');
      const looksLikeVisionProSafariUa = /Macintosh/i.test(ua)
        && /Version\/\d+/i.test(ua)
        && /Safari\/605\.1\.15/i.test(ua)
        && !/iPad|iPhone|iPod/i.test(ua);
      if (isAppleBrowser && looksLikeVisionProSafariUa) return true;
      if (!isAppleBrowser || !xrSession) return false;

      const enabledFeatures = Array.isArray(xrSession.enabledFeatures) ? xrSession.enabledFeatures : [];
      const looksLikeAvpFeatureSet = enabledFeatures.includes('local')
        && enabledFeatures.includes('hand-tracking')
        && !enabledFeatures.includes('local-floor');
      if (looksLikeAvpFeatureSet) return true;

      // AVP immersive sessions in Safari are world-space + alpha-blend.
      return xrSession.interactionMode === 'world-space'
        && xrSession.environmentBlendMode === 'alpha-blend';
    }

    function isArLikeSession(xrSession) {
      if (!xrSession) return false;
      if (xrSession.mode === 'immersive-ar') return true;
      // Some devices expose passthrough XR as immersive-vr + alpha-blend.
      return xrSession.environmentBlendMode === 'alpha-blend';
    }

    function getVrWindowBaseYOffset() {
      return isCurrentXrSessionAvp ? AVP_VR_WINDOW_Y_OFFSET : 0;
    }

    function getVrContentBaseYOffset() {
      return isCurrentXrSessionAvp ? AVP_VR_WINDOW_Y_OFFSET : 0;
    }

    // ── VR Window Frame (mask) ──
    // A large dark-gray plane with a transparent rounded-rect hole in the center.
    // Outside the hole = opaque dark matte (blocks rear texture), inside the hole = transparent (shows 3DGS).
    const MASK_CANVAS_W = 1600, MASK_CANVAS_H = 1000;
    const MASK_PLANE_W = 5.0, MASK_PLANE_H = 3.125;  // plane world size (matches canvas aspect 1600:1000)

    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = MASK_CANVAS_W;
    maskCanvas.height = MASK_CANVAS_H;
    const maskCtx = maskCanvas.getContext('2d');

    const maskTexture = new THREE.CanvasTexture(maskCanvas);
    maskTexture.minFilter = THREE.LinearFilter;
    maskTexture.magFilter = THREE.LinearFilter;
    maskTexture.generateMipmaps = false;
    const maskMaterial = new THREE.MeshBasicMaterial({
      map: maskTexture,
      transparent: true,
      side: THREE.FrontSide,
      depthTest: false,
      depthWrite: false,
    });
    const vrWindowMask = new THREE.Mesh(
      new THREE.PlaneGeometry(MASK_PLANE_W, MASK_PLANE_H),
      maskMaterial,
    );
    vrWindowMask.renderOrder = 9998;
    vrWindowMask.frustumCulled = false;
    vrWindowMask.visible = false;

    // Container group for the window
    const vrFrameGroup = new THREE.Group();
    vrFrameGroup.visible = false;
    scene.add(vrFrameGroup);

    const vrBounds = new THREE.Box3();
    const vrSplatCenterWorld = new THREE.Vector3();
    const vrSplatCenterInFrame = new THREE.Vector3();
    const vrSplatSize = new THREE.Vector3();
    const vrFrameRight = new THREE.Vector3();
    const vrFrameUp = new THREE.Vector3();
    const vrCorner = new THREE.Vector3();

    const FRAME_DIST = 1.5;
    const AR_TV_SCALE = 1.0; // Inner content window same size as VR mode
    const vrWindowWhiteBoard = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0x1a1a1a,
        side: THREE.FrontSide,
        depthTest: false,
        depthWrite: false,
      }),
    );
    vrWindowWhiteBoard.renderOrder = 9997;
    vrWindowWhiteBoard.frustumCulled = false;
    vrWindowWhiteBoard.visible = false;
    vrWindowWhiteBoard.position.set(0, 0, -FRAME_DIST - 0.001);
    vrFrameGroup.add(vrWindowWhiteBoard);

    vrWindowMask.position.set(0, 0, -FRAME_DIST);
    vrFrameGroup.add(vrWindowMask);

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawVrWindowMask(openW, openH) {
      winW = Math.max(VR_MIN_WIN_W, Math.min(VR_MAX_WIN_W, Number(openW) || DEFAULT_WIN_W));
      winH = Math.max(VR_MIN_WIN_H, Math.min(VR_MAX_WIN_H, Number(openH) || DEFAULT_WIN_H));
      vrWindowWhiteBoard.scale.set(winW, winH, 1);

      const holePixW = (winW / MASK_PLANE_W) * MASK_CANVAS_W;
      const holePixH = (winH / MASK_PLANE_H) * MASK_CANVAS_H;
      const holeX = (MASK_CANVAS_W - holePixW) / 2;
      const holeY = (MASK_CANVAS_H - holePixH) / 2;
      const holeRad = Math.max(20, Math.min(120, Math.min(holePixW, holePixH) * 0.12));

      // 1) Fill canvas with opaque dark matte to fully block rear texture bleed in VR
      maskCtx.clearRect(0, 0, MASK_CANVAS_W, MASK_CANVAS_H);
      maskCtx.fillStyle = 'rgba(0, 0, 0, 1)';
      maskCtx.fillRect(0, 0, MASK_CANVAS_W, MASK_CANVAS_H);

      // 2) Cut out a transparent rounded-rect hole in the center
      maskCtx.globalCompositeOperation = 'destination-out';
      maskCtx.fillStyle = '#000';
      roundRect(maskCtx, holeX, holeY, holePixW, holePixH, holeRad);
      maskCtx.fill();
      maskCtx.globalCompositeOperation = 'source-over';

      // 3) Draw a subtle border around the window opening
      maskCtx.strokeStyle = 'rgba(180, 180, 180, 0.6)';
      maskCtx.lineWidth = 3 * (MASK_CANVAS_W / 1600);
      roundRect(maskCtx, holeX, holeY, holePixW, holePixH, holeRad);
      maskCtx.stroke();

      maskTexture.needsUpdate = true;

    }

    // AR: keep the same logical window size as VR for fitting / debug HUD, but do not draw
    // a matte mask or rounded bezel — passthrough shows everywhere around the splat.
    function drawArTvMask(openW, openH) {
      const tvW = (Number(openW) || DEFAULT_WIN_W) * AR_TV_SCALE;
      const tvH = (Number(openH) || DEFAULT_WIN_H) * AR_TV_SCALE;
      winW = Math.max(VR_MIN_WIN_W * AR_TV_SCALE, Math.min(VR_MAX_WIN_W * AR_TV_SCALE, tvW));
      winH = Math.max(VR_MIN_WIN_H * AR_TV_SCALE, Math.min(VR_MAX_WIN_H * AR_TV_SCALE, tvH));
      vrWindowWhiteBoard.scale.set(winW, winH, 1);
    }

    // Dispatcher: uses TV mask in AR, normal mask in VR/desktop
    function drawWindowMask(openW, openH) {
      if (currentXrMode === 'immersive-ar') {
        drawArTvMask(openW, openH);
      } else {
        drawVrWindowMask(openW, openH);
      }
    }

    (() => {
      const d = getDefaultVrWindowDimensions();
      drawVrWindowMask(d.w, d.h);
    })();

    // ── VR debug HUD (3D plane in the playback window) ─────────────────────────
    const VR_HUD_CW = 1536;
    const VR_HUD_CH = 480;
    const vrDebugCanvas = document.createElement('canvas');
    vrDebugCanvas.width = VR_HUD_CW;
    vrDebugCanvas.height = VR_HUD_CH;
    const vrDebugTexture = new THREE.CanvasTexture(vrDebugCanvas);
    vrDebugTexture.generateMipmaps = false;
    vrDebugTexture.minFilter = THREE.LinearFilter;
    vrDebugTexture.magFilter = THREE.LinearFilter;
    const vrDebugHudMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(0.60, 0.1875),
      new THREE.MeshBasicMaterial({
        map: vrDebugTexture,
        transparent: true,
        depthTest: false,
        depthWrite: false,
        side: THREE.FrontSide,
      }),
    );
    vrDebugHudMesh.renderOrder = 9999;
    vrDebugHudMesh.visible = false;
    vrFrameGroup.add(vrDebugHudMesh);

    function drawVrDebugHud(fps, resW, resH, fovText) {
      const ctx = vrDebugCanvas.getContext('2d');
      if (!ctx) return;
      const cw = VR_HUD_CW;
      const ch = VR_HUD_CH;
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = 'rgba(10,10,10,0.78)';
      roundRect(ctx, 0, 0, cw, ch, 54);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 6;
      roundRect(ctx, 3, 3, cw - 6, ch - 6, 51);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.font = 'bold 108px ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      ctx.fillText(`FPS: ${fps}`, 54, ch * 0.20);
      ctx.fillText(`RES: ${resW}\u00d7${resH}`, 54, ch * 0.53);
      ctx.fillText(fovText, 54, ch * 0.84);
      vrDebugTexture.needsUpdate = true;
    }
    // ─────────────────────────────────────────────────────────────────────────

    function centerSplatInVrWindow() {
      if (!loadedSplat) return;
      vrBounds.setFromObject(loadedSplat);
      if (vrBounds.isEmpty()) return;
      vrBounds.getSize(vrSplatSize);

      vrBounds.getCenter(vrSplatCenterWorld);
      vrSplatCenterInFrame.copy(vrSplatCenterWorld);
      vrFrameGroup.worldToLocal(vrSplatCenterInFrame);

      const dx = vrSplatCenterInFrame.x;
      const dy = vrSplatCenterInFrame.y;
      const avpSplatUpBias = isCurrentXrSessionAvp
        ? THREE.MathUtils.clamp(vrSplatSize.y * 0.18, 0.08, 0.5)
        : 0;
      if (Math.abs(dx) + Math.abs(dy - avpSplatUpBias) < 1e-6) return;

      vrFrameRight.set(1, 0, 0).applyQuaternion(vrFrameGroup.quaternion);
      vrFrameUp.set(0, 1, 0).applyQuaternion(vrFrameGroup.quaternion);
      localFrame.position.addScaledVector(vrFrameRight, -dx);
      localFrame.position.addScaledVector(vrFrameUp, avpSplatUpBias - dy);
    }

    function fitVrWindowToSplat() {
      if (!loadedSplat) {
        (() => {
          const d = getDefaultVrWindowDimensions();
          drawWindowMask(d.w, d.h);
        })();
        return;
      }

      centerSplatInVrWindow();

      vrBounds.setFromObject(loadedSplat);
      if (vrBounds.isEmpty()) {
        (() => {
          const d = getDefaultVrWindowDimensions();
          drawWindowMask(d.w, d.h);
        })();
        return;
      }

      const xs = [vrBounds.min.x, vrBounds.max.x];
      const ys = [vrBounds.min.y, vrBounds.max.y];
      const zs = [vrBounds.min.z, vrBounds.max.z];

      let minX = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;

      for (const x of xs) {
        for (const y of ys) {
          for (const z of zs) {
            vrCorner.set(x, y, z);
            vrFrameGroup.worldToLocal(vrCorner);
            minX = Math.min(minX, vrCorner.x);
            maxX = Math.max(maxX, vrCorner.x);
            minY = Math.min(minY, vrCorner.y);
            maxY = Math.max(maxY, vrCorner.y);
          }
        }
      }

      const spanX = Math.max(1e-4, maxX - minX);
      const spanY = Math.max(1e-4, maxY - minY);
      let desiredW = spanX * VR_TARGET_VISIBLE_AXIS;
      let desiredH = spanY * VR_TARGET_VISIBLE_AXIS;
      const targetAr = getViewerAspectRatioNumber();
      const ar = desiredW / desiredH;
      if (ar > targetAr) {
        desiredH = desiredW / targetAr;
      } else {
        desiredW = desiredH * targetAr;
      }
      drawWindowMask(desiredW, desiredH);

      // Recenter once more after changing aperture size.
      centerSplatInVrWindow();
    }

    function setViewerAspectMode(mode) {
      viewerAspectMode = normalizeViewerAspectMode(mode);
      syncViewerWindowAspectCss();
      try {
        localStorage.setItem(VIEWER_ASPECT_STORAGE_KEY, viewerAspectMode);
      } catch {
      }
      resize();
      if (renderer.xr.isPresenting) {
        if (loadedSplat) {
          fitVrWindowToSplat();
        } else {
          const d = getDefaultVrWindowDimensions();
          drawWindowMask(d.w, d.h);
        }
      }
    }

    let shouldResetViewAfterVrExit = false;
    let vrFrameInitialized = false;
    let pendingVrRefit = false;
    let xrPlaybackClockInitialized = false;
    let xrPlaybackLastTimestamp = 0;
    let xrPlaybackElapsedMs = 0;
    let currentXrMode = null;
    function resetXrPlaybackClock() {
      xrPlaybackClockInitialized = false;
      xrPlaybackLastTimestamp = 0;
      xrPlaybackElapsedMs = 0;
    }

    // ── Head-pose driven safe-zone blur ───────────────────────────────────────
    // 4D Gaussian Splat captures only support a small 6DoF pocket around the
    // recording viewpoint. When the user's head leaves that pocket Spark has
    // to extrapolate and visible artifacts appear.
    //
    // We do REAL screen-space Gaussian blur here, not splat-geometry inflation
    // (the latter just makes ellipsoids visibly bigger, which is ugly). The
    // blur is implemented as a 2-pass separable Gaussian post-process: scene
    // is rendered to an offscreen render target, blurred horizontally then
    // vertically, then composited back into the XR framebuffer per eye. See
    // `setupXrBlurPipeline()` below for the actual GL setup.
    const blurParams = {
      // The "origin" is the world-space default origin (0, 0, 0) of the XR
      // reference space — i.e. the pose three.js maps the splat scene to.
      // All deltas below are measured relative to that fixed origin, NOT to
      // wherever the user happens to be standing later. We want generous
      // tolerances so casual leaning and looking around stays sharp; only
      // large excursions blur.
      posStart: 0.45, // metres — < ~half a step from origin: no blur
      posFull: 1.10,  // metres — > 1.1 m from origin: fully blurred
      rotStart: 30,   // degrees — < 30° head turn from origin: no blur
      rotFull: 65,    // degrees — > 65° from origin: fully blurred
      ease: 4.5,      // exponential smoothing rate (lower = gentler fade)
      // Maximum per-axis Gaussian step in pixels for the H/V passes.
      // The shader is a 9-tap Gaussian, so the effective stddev at full
      // blur is roughly blurRadiusMax * 1.6.
      blurRadiusMax: 6.0,
      // Fixed internal RT downscale used WHENEVER blur is active. We do NOT
      // interpolate this with the blur amount because every change in RT
      // size triggers a GPU texture reallocation in three.js — that was the
      // single biggest cause of the 60→22 fps drop. A constant scale keeps
      // the RTs sticky and the per-frame cost roughly flat.
      // 0.5 ⇒ ¼ of the XR fb pixels for the splat render and blur passes,
      // and bilinear upsampling on the composite supplies additional softness
      // for free.
      blurRtScale: 0.5,
    };
    {
      // Allow per-device tuning via URL query, e.g.
      //   ?blurPosStart=0.20&blurPosFull=0.50&blurRotStart=15&blurRotFull=40
      //   &blurRadiusMax=7&blurEase=6&blurRtScale=0.4
      const u = new URLSearchParams(window.location.search);
      const overrides = {
        posStart: 'blurPosStart',
        posFull: 'blurPosFull',
        rotStart: 'blurRotStart',
        rotFull: 'blurRotFull',
        ease: 'blurEase',
        blurRadiusMax: 'blurRadiusMax',
        blurRtScale: 'blurRtScale',
      };
      for (const [k, qk] of Object.entries(overrides)) {
        const raw = u.get(qk);
        if (raw === null) continue;
        const v = Number(raw);
        if (Number.isFinite(v) && v >= 0) blurParams[k] = v;
      }
      blurParams.posFull = Math.max(blurParams.posFull, blurParams.posStart + 0.02);
      blurParams.rotFull = Math.max(blurParams.rotFull, blurParams.rotStart + 1);
      blurParams.blurRtScale = THREE.MathUtils.clamp(blurParams.blurRtScale, 0.25, 1);
    }

    // The reference is the WORLD-SPACE DEFAULT ORIGIN: position (0,0,0) and
    // identity orientation. We measure the head's deviation from that fixed
    // pose — not from a dynamically captured anchor — so blur correlates
    // with how far the user has wandered from the scene's natural viewing
    // sweet spot, regardless of when they entered XR.
    let smoothedBlur = 0;
    const _blurTmpPos = new THREE.Vector3();
    const _blurTmpQuat = new THREE.Quaternion();
    const _blurTmpScale = new THREE.Vector3();

    function resetHeadAnchor() {
      // The origin is fixed at world (0,0,0) / identity, so there's nothing
      // to re-anchor — we just snap the smoothed blur back to 0 to avoid a
      // visible carry-over after sessionstart / sessionend / Recenter.
      smoothedBlur = 0;
    }

    function updateHeadBlur(deltaSeconds) {
      if (!renderer.xr.isPresenting) {
        smoothedBlur = 0;
        return;
      }
      const xrCam = renderer.xr.getCamera();
      if (!xrCam) return;
      // Force-refresh the XR array camera against the current viewer pose
      // BEFORE we read it. updateHeadBlur runs in the animate loop _before_
      // renderer.render(), so without this call the matrix would still hold
      // the previous frame's pose.
      try { renderer.xr.updateCamera(camera); } catch (_) {}
      xrCam.matrixWorld.decompose(_blurTmpPos, _blurTmpQuat, _blurTmpScale);

      // Distance from the world origin (the splat's natural viewing pose).
      const posDelta = _blurTmpPos.length();
      // Angle of the head's orientation away from identity, in degrees.
      // For a unit quaternion (x,y,z,w), the rotation magnitude is
      // 2 * acos(|w|).
      const w = THREE.MathUtils.clamp(Math.abs(_blurTmpQuat.w), -1, 1);
      const angDeg = THREE.MathUtils.radToDeg(2 * Math.acos(w));

      const posT = THREE.MathUtils.clamp(
        (posDelta - blurParams.posStart) / Math.max(1e-3, blurParams.posFull - blurParams.posStart),
        0, 1,
      );
      const rotT = THREE.MathUtils.clamp(
        (angDeg - blurParams.rotStart) / Math.max(1e-3, blurParams.rotFull - blurParams.rotStart),
        0, 1,
      );
      const targetBlur = Math.max(posT, rotT);

      const a = 1 - Math.exp(-Math.max(0, deltaSeconds) * blurParams.ease);
      smoothedBlur += (targetBlur - smoothedBlur) * a;
      if (smoothedBlur < 1e-4) smoothedBlur = 0;
    }

    // ── XR post-process blur pipeline ─────────────────────────────────────────
    // Builds three render targets (sceneRT for the rendered scene plus two
    // ping-pong targets for the separable Gaussian) and a fullscreen quad
    // scene used both for the blur passes and for the per-eye composite back
    // into the XR framebuffer.
    function makeBlurRT() {
      const rt = new THREE.WebGLRenderTarget(2, 2, {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        wrapS: THREE.ClampToEdgeWrapping,
        wrapT: THREE.ClampToEdgeWrapping,
        format: THREE.RGBAFormat,
        type: THREE.UnsignedByteType,
        depthBuffer: false,
        stencilBuffer: false,
      });

      return rt;
    }
    const sceneRT = new THREE.WebGLRenderTarget(2, 2, {
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter,
      wrapS: THREE.ClampToEdgeWrapping,
      wrapT: THREE.ClampToEdgeWrapping,
      format: THREE.RGBAFormat,
      type: THREE.UnsignedByteType,
      depthBuffer: true,
      stencilBuffer: false,
    });
    sceneRT.texture.generateMipmaps = false;
    const blurPingRT = makeBlurRT();
    const blurPongRT = makeBlurRT();
    let blurRTSize = { w: 0, h: 0 };
    let blurXrFbSize = { w: 0, h: 0 };

    const fsBlurMaterial = new THREE.ShaderMaterial({
      transparent: false,
      depthTest: false,
      depthWrite: false,
      blending: THREE.NoBlending,
      uniforms: {
        tDiffuse: { value: null },
        uTexel: { value: new THREE.Vector2() },
        uDir: { value: new THREE.Vector2(1, 0) },
        uRadius: { value: 0 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform vec2 uTexel;
        uniform vec2 uDir;
        uniform float uRadius;
        varying vec2 vUv;
        void main() {
          // 9-tap separable Gaussian. Weights match a stddev≈2.0 kernel; the
          // visual stddev scales with uRadius.
          vec2 step = uDir * uTexel * uRadius;
          vec4 c  = texture(tDiffuse, vUv) * 0.227027;
          c += texture(tDiffuse, vUv + step * 1.0) * 0.1945946;
          c += texture(tDiffuse, vUv - step * 1.0) * 0.1945946;
          c += texture(tDiffuse, vUv + step * 2.0) * 0.1216216;
          c += texture(tDiffuse, vUv - step * 2.0) * 0.1216216;
          c += texture(tDiffuse, vUv + step * 3.0) * 0.054054;
          c += texture(tDiffuse, vUv - step * 3.0) * 0.054054;
          c += texture(tDiffuse, vUv + step * 4.0) * 0.016216;
          c += texture(tDiffuse, vUv - step * 4.0) * 0.016216;
          gl_FragColor = c;
        }
      `,
    });

      transparent: false,
      depthTest: false,
      depthWrite: false,
      // Direct copy — the scene RT already holds the final premultiplied-
      // alpha image, including the transparent regions for AR passthrough.
      blending: THREE.NoBlending,
      uniforms: {
        tDiffuse: { value: null },
        // Per-eye sub-rect of the scene RT, in normalised UV coords.
        uUvRect: { value: new THREE.Vector4(0, 0, 1, 1) },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform vec4 uUvRect;
        varying vec2 vUv;
        void main() {
          vec2 uv = uUvRect.xy + vUv * uUvRect.zw;
          gl_FragColor = texture(tDiffuse, uv);
        }
      `,
    });

    const fsQuadGeom = new THREE.PlaneGeometry(2, 2);
    const fsQuadScene = new THREE.Scene();
    const fsQuadCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const fsQuadMesh = new THREE.Mesh(fsQuadGeom, fsBlurMaterial);
    fsQuadMesh.frustumCulled = false;
    fsQuadScene.add(fsQuadMesh);

    // We add it as a separate scene so that, in XR, three.js's per-eye loop
    // calls our quad's onBeforeRender once per eye and we can swap the per-eye
    // UV sub-rect uniform.
    const compositeScene = new THREE.Scene();
    const compositeQuad = new THREE.Mesh(fsQuadGeom, fsCompositeMaterial);

      // the XR fb share the same viewport ratio, so dividing by the XR fb
      // size gives correct UVs into the (possibly downscaled) RT.
      const fw = blurXrFbSize.w || 1;
      const fh = blurXrFbSize.h || 1;

          vp.x / fw,
          vp.y / fh,
          vp.z / fw,
          vp.w / fh,
        );

        return;
      }
      sceneRT.setSize(w, h);
      blurPingRT.setSize(w, h);
      blurPongRT.setSize(w, h);
      blurRTSize.w = w;
      blurRTSize.h = h;

        return;

      blurXrFbSize.w = fb.w;
      blurXrFbSize.h = fb.h;
      // Fixed downscale — see comment on blurParams.blurRtScale. Constant
      // size keeps GPU memory sticky (no per-frame texture reallocation,
      // which is what tanked the framerate).
      const scale = blurParams.blurRtScale;
      ensureBlurRTSize(Math.round(fb.w * scale), Math.round(fb.h * scale));

      const prevRenderTarget = renderer.getRenderTarget();
      const prevAutoClear = renderer.autoClear;
      const prevAutoClearColor = renderer.autoClearColor;
      const prevAutoClearDepth = renderer.autoClearDepth;
      const prevXrEnabled = renderer.xr.enabled;
      const prevClearAlpha = renderer.getClearAlpha();
      renderer.getClearColor(_blurPrevClearColor);
      renderer.getViewport(_blurPrevViewport);

      // Disable the XR auto-camera path so renderer.render() respects our
      // per-eye camera + RT instead of going to the XR framebuffer.
      renderer.xr.enabled = false;

      renderer.setScissor(0, 0, blurRTSize.w, blurRTSize.h);
      renderer.setScissorTest(true);
      renderer.clear(true, true, false);
      renderer.setScissorTest(false);
      for (let i = 0; i < eyes.length; i++) {
        const eye = eyes[i];
        const vp = eye.viewport;
        if (!vp) continue;
        // Translate XR-framebuffer pixels into our (possibly downscaled) RT.
        const x = Math.round(vp.x * scale);
        const y = Math.round(vp.y * scale);
        const w = Math.max(1, Math.round(vp.z * scale));
        const h = Math.max(1, Math.round(vp.w * scale));
        renderer.setViewport(x, y, w, h);
        renderer.setScissor(x, y, w, h);
        renderer.setScissorTest(true);
        renderer.render(scene, eye);

      renderer.setScissorTest(false);
      renderer.autoClear = prevAutoClear;
      renderer.autoClearColor = prevAutoClearColor;
      renderer.autoClearDepth = prevAutoClearDepth;

      // ── 2) Separable Gaussian blur — single H + V iteration ─────────────
      // The RT is already half-res, so bilinear upsample on the composite
      // adds a free ~1px stddev on top. One H+V pass with a 9-tap kernel
      // and a moderate step gives plenty of perceived blur for a fraction
      // of the cost of the previous 4-pass chain.
      const baseRadius = blurParams.blurRadiusMax * blur;

      fsQuadMesh.material = fsBlurMaterial;
      renderer.setViewport(0, 0, blurRTSize.w, blurRTSize.h);

      fsBlurMaterial.uniforms.uDir.value.set(1, 0);
      fsBlurMaterial.uniforms.uRadius.value = baseRadius;
      renderer.setRenderTarget(blurPingRT);
      renderer.render(fsQuadScene, fsQuadCamera);

      // V: blurPingRT -> blurPongRT
      fsBlurMaterial.uniforms.tDiffuse.value = blurPingRT.texture;
      fsBlurMaterial.uniforms.uDir.value.set(0, 1);
      fsBlurMaterial.uniforms.uRadius.value = baseRadius;
      renderer.setRenderTarget(blurPongRT);
      renderer.render(fsQuadScene, fsQuadCamera);

      const blurredTex = blurPongRT.texture;

      // ── 3) Composite back to the XR framebuffer ─────────────────────────
      renderer.xr.enabled = prevXrEnabled;
      renderer.setRenderTarget(prevRenderTarget);
      renderer.setViewport(_blurPrevViewport);
      renderer.setClearColor(_blurPrevClearColor, prevClearAlpha);
      fsCompositeMaterial.uniforms.tDiffuse.value = blurredTex;
      // We're about to clear+render the composite quad to the XR fbo, which
      // will overwrite the per-eye viewports; let three.js's normal XR loop
      // handle viewport setting via the array camera.
      fsQuadMesh.material = fsBlurMaterial; // restore for next frame
      renderer.render(compositeScene, camera);

        type: 'xr-sessionstart',
        timestamp: Date.now(),
        xrMode: currentXrMode,
        isCurrentXrSessionAvp,
        vrWindowBaseYOffset,
        vrContentBaseYOffset,
        userAgent: navigator.userAgent || '',
        userAgentData: navigator.userAgentData || null,
        platform: navigator.platform || '',
        vendor: navigator.vendor || '',
        xr: xrSession ? {

          environmentBlendMode: xrSession.environmentBlendMode || null,

        // No rounded matte / bezel mask in AR — full passthrough

        vrFrameInitialized = false;
        vrFrameGroup.position.set(0, vrWindowBaseYOffset, 0);
        vrFrameGroup.rotation.set(0, 0, 0);
        localFrame.position.set(0, vrContentBaseYOffset, 0);
        localFrame.rotation.set(0, 0, 0);
        localFrame.scale.setScalar(XR_SCENE_SCALE);
        (() => {

        if (debugVisible) debugLastUpdateMs = -Infinity;
        vrFrameGroup.visible = true;
        vrWindowWhiteBoard.visible = true;
        vrWindowMask.visible = true;
        vrFrameInitialized = false;
        vrFrameGroup.position.set(0, vrWindowBaseYOffset, 0);
        vrFrameGroup.rotation.set(0, 0, 0);
        localFrame.position.set(0, vrContentBaseYOffset, 0);
        localFrame.rotation.set(0, 0, 0);
        localFrame.scale.setScalar(XR_SCENE_SCALE);
        (() => {
          const d = getDefaultVrWindowDimensions();

      vrFrameGroup.visible = false;
      vrWindowWhiteBoard.visible = false;
      localFrame.position.set(0, 0, 0);
      localFrame.rotation.set(0, 0, 0);
      localFrame.scale.set(1, 1, 1);
      vrFrameInitialized = false;
      isCurrentXrSessionAvp = false;
      pendingVrRefit = false;

      resetXrPlaybackClock();

    const controls = new SparkControls({ canvas: sparkCanvasEl });
    controls.fpsMovement.rotateSpeed = 0.6;
    controls.fpsMovement.moveSpeed = 0.8;
    controls.fpsMovement.keycodeMoveMapping = {};
    controls.fpsMovement.keycodeRotateMapping = {};

      12,

    const MOBILE_MOTION_ROTATE_RANGE_DEG = MOBILE_MOTION_ROTATE_ABS_MAX_DEG;
    const MOBILE_MOTION_ROTATE_MAX_DEG = MOBILE_MOTION_ROTATE_ABS_MAX_DEG;
    const MOBILE_MOTION_MOVE_START_DEG = THREE.MathUtils.clamp(
      Number.isFinite(motionMoveAngleParam) ? motionMoveAngleParam : 2,

      MOBILE_MOTION_ROTATE_ABS_MAX_DEG - 0.5,
    );
    const MOBILE_MOTION_MOVE_MAX_DEG = MOBILE_MOTION_ROTATE_ABS_MAX_DEG;
    const MOBILE_MOTION_MOVE_MAX_DISTANCE_FORWARD = 0.5;
    const MOBILE_MOTION_MOVE_MAX_DISTANCE_BACKWARD = 0.1;
    const MOBILE_MOTION_MOVE_MAX_DISTANCE_LATERAL = 0.1;

    const motionRightVector = new THREE.Vector3();
    const motionOffsetVector = new THREE.Vector3();

      listenersBound: false,
      permissionDenied: false,

      baselineGamma: null,

      filteredGammaDelta: 0,
      lastBeta: null,
      lastGamma: null,
      lastEventTimeMs: 0,

    let orbitPitch = 0;
    let orbitDistance = 1.5;

    let initialOrbitYaw = 0;

    let lastOrbitAspectScale = 1;

    const ORBIT_FRAMING_REF_ASPECT = 16 / 9;
    /** Extra pull-back on narrow (portrait) canvases (target: full-scene framing like wide mode). */
    const ORBIT_PORTRAIT_BOOST = 4.14;

    function getOrbitDistanceAspectScale() {
      const ar = camera.aspect;

      const base = ORBIT_FRAMING_REF_ASPECT / Math.max(ar, 0.25);

    const spatialKeyState = {

      moveForward: new Set(['KeyW']),
      moveBackward: new Set(['KeyS']),
      moveLeft: new Set(['KeyA']),
      moveRight: new Set(['KeyD']),
    };

    function updateSpatialKeyState(code, pressed) {
      let consumed = false;
      for (const [name, codes] of Object.entries(keyboardRotationBindings)) {
        if (!codes.has(code)) continue;
        spatialKeyState[name] = pressed;
        consumed = true;
      }
      for (const [name, codes] of Object.entries(keyboardMoveBindings)) {
        if (!codes.has(code)) continue;
        spatialKeyState[name] = pressed;
        consumed = true;
      }

      motionState.baselineBeta = null;
      motionState.baselineGamma = null;

      motionState.filteredGammaDelta = 0;
      motionState.lastBeta = null;
      motionState.lastGamma = null;

      if (motionState.anchorForward.lengthSq() <= 1e-6) {
        motionState.anchorForward.set(0, 0, -1);
      } else {
        motionState.anchorForward.normalize();
      }
      motionState.anchorReady = true;
    }

    function applyDeadzoneAndNormalize(value, deadzoneDeg, maxRangeDeg) {
      const absValue = Math.abs(value);
      if (absValue <= deadzoneDeg) return 0;
      const normalized = (absValue - deadzoneDeg) / Math.max(1, maxRangeDeg - deadzoneDeg);
      return Math.sign(value) * THREE.MathUtils.clamp(normalized, 0, 1);
    }

    function handleDeviceOrientation(event) {
      if (!motionState.enabled) return;
      const { beta, gamma } = event;
      if (!Number.isFinite(beta) || !Number.isFinite(gamma)) return;

      motionState.lastBeta = beta;
      motionState.lastGamma = gamma;
      motionState.lastEventTimeMs = performance.now();

      if (motionState.baselineBeta == null || motionState.baselineGamma == null) {
        motionState.baselineBeta = beta;
        motionState.baselineGamma = gamma;
        return;
      }

      const betaDelta = THREE.MathUtils.clamp(
        wrapSignedDeltaDegrees(beta - motionState.baselineBeta),
        -60,
        60,
      );
      const gammaDelta = THREE.MathUtils.clamp(
        wrapSignedDeltaDegrees(gamma - motionState.baselineGamma),
        -60,
        60,
      );

      const smoothFactor = 0.18;
      motionState.filteredBetaDelta += (betaDelta - motionState.filteredBetaDelta) * smoothFactor;
      motionState.filteredGammaDelta += (gammaDelta - motionState.filteredGammaDelta) * smoothFactor;
    }

    function applyMotionAutoRecenter(deltaSeconds) {
      if (!motionState.enabled) return;
      if (!Number.isFinite(motionState.lastBeta) || !Number.isFinite(motionState.lastGamma)) return;
      if (!Number.isFinite(motionState.baselineBeta) || !Number.isFinite(motionState.baselineGamma)) return;

      const nowMs = performance.now();
      if (nowMs - motionState.lastEventTimeMs > MOBILE_MOTION_EVENT_TIMEOUT_MS) {
        motionState.filteredBetaDelta *= 0.8;
        motionState.filteredGammaDelta *= 0.8;
        return;
      }

      const betaDelta = THREE.MathUtils.clamp(
        wrapSignedDeltaDegrees(motionState.lastBeta - motionState.baselineBeta),
        -60,
        60,
      );
      const gammaDelta = THREE.MathUtils.clamp(
        wrapSignedDeltaDegrees(motionState.lastGamma - motionState.baselineGamma),
        -60,
        60,
      );

      const seemsStill = Math.abs(betaDelta) < MOBILE_MOTION_REST_ANGLE_DEG
        && Math.abs(gammaDelta) < MOBILE_MOTION_REST_ANGLE_DEG;
      const hasIntent = Math.abs(betaDelta) >= MOBILE_MOTION_MOVE_START_DEG
        || Math.abs(gammaDelta) >= MOBILE_MOTION_ROTATE_DEADZONE_DEG + 3;

      if (seemsStill && !hasIntent) {
        const adapt = THREE.MathUtils.clamp(MOBILE_MOTION_RECENTER_RATE * deltaSeconds, 0, 0.5);
        motionState.baselineBeta += betaDelta * adapt;
        motionState.baselineGamma += gammaDelta * adapt;
      }
    }

    function bindMotionListeners() {
      if (motionState.listenersBound) return;
      window.addEventListener('deviceorientation', handleDeviceOrientation, true);
      window.addEventListener('orientationchange', () => {
        resetMotionBaseline();
      });
      motionState.listenersBound = true;
    }

    function setMotionEnabled(enabled) {
      const nextEnabled = Boolean(enabled);
      motionState.enabled = nextEnabled;
      if (nextEnabled) {
        if (motionState.supported) {
          bindMotionListeners();
        }
        resetMotionBaseline();
        resetMotionAnchor();
      } else {
        resetMotionBaseline();
        resetMotionAnchor();
      }
    }

    async function requestMotionPermissionIfNeeded() {
      if (!motionState.supported) return false;

      const pending = [];
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        pending.push(DeviceOrientationEvent.requestPermission());
      }
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        pending.push(DeviceMotionEvent.requestPermission());
      }
      if (!pending.length) return true;

      const results = await Promise.allSettled(pending);
      return results.every((entry) => entry.status === 'fulfilled' && entry.value === 'granted');
    }

    function applyMobileMotionInput(deltaSeconds) {
      if (!motionState.enabled || deltaSeconds <= 0) {
        return { rotated: false, moved: false };
      }

      if (!motionState.anchorReady) {
        captureMotionAnchorFromCurrentCamera();
      }

      if (motionState.supported) {
        applyMotionAutoRecenter(deltaSeconds);
      }

      const keyboardGammaDelta = (
        (spatialKeyState.turnRight ? 1 : 0) - (spatialKeyState.turnLeft ? 1 : 0)
      ) * MOBILE_MOTION_ROTATE_ABS_MAX_DEG;
      const keyboardBetaDelta = (
        (spatialKeyState.tiltBackward ? 1 : 0) - (spatialKeyState.tiltForward ? 1 : 0)
      ) * MOBILE_MOTION_ROTATE_ABS_MAX_DEG;
      const keyboardForwardInput = (
        (spatialKeyState.moveForward ? 1 : 0) - (spatialKeyState.moveBackward ? 1 : 0)
      );
      const keyboardLateralInput = (
        (spatialKeyState.moveRight ? 1 : 0) - (spatialKeyState.moveLeft ? 1 : 0)
      );

      const combinedGammaDelta = THREE.MathUtils.clamp(
        motionState.filteredGammaDelta + keyboardGammaDelta,
        -MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
        MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
      );
      const combinedBetaDelta = THREE.MathUtils.clamp(
        motionState.filteredBetaDelta + keyboardBetaDelta,
        -MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
        MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
      );

      let rotated = false;
      let moved = false;

      const yawInput = applyDeadzoneAndNormalize(
        THREE.MathUtils.clamp(
          combinedGammaDelta,
          -MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
          MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
        ),
        MOBILE_MOTION_ROTATE_DEADZONE_DEG,
        MOBILE_MOTION_ROTATE_RANGE_DEG,
      );
      const pitchInput = applyDeadzoneAndNormalize(
        THREE.MathUtils.clamp(
          -combinedBetaDelta,
          -MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
          MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
        ),
        MOBILE_MOTION_ROTATE_DEADZONE_DEG,
        MOBILE_MOTION_ROTATE_RANGE_DEG,
      );

      if (Math.abs(yawInput) > 0 || Math.abs(pitchInput) > 0) {
        const rotateLimitRad = THREE.MathUtils.degToRad(MOBILE_MOTION_ROTATE_MAX_DEG);
        orbitTarget.copy(motionState.anchorOrbitTarget);
        orbitDistance = motionState.anchorOrbitDistance;
        orbitYaw = motionState.anchorOrbitYaw - yawInput * rotateLimitRad;
        orbitPitch = THREE.MathUtils.clamp(
          motionState.anchorOrbitPitch + pitchInput * rotateLimitRad,
          -Math.PI / 2 + 0.05,
          Math.PI / 2 - 0.05,
        );
        applyOrbit();
        rotated = true;
      }

      const moveInput = applyDeadzoneAndNormalize(
        THREE.MathUtils.clamp(
          -combinedBetaDelta,
          -MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
          MOBILE_MOTION_ROTATE_ABS_MAX_DEG,
        ),
        MOBILE_MOTION_MOVE_START_DEG,
        MOBILE_MOTION_MOVE_MAX_DEG,
      );

      const forwardInput = THREE.MathUtils.clamp(moveInput + keyboardForwardInput, -1, 1);
      const lateralInput = THREE.MathUtils.clamp(keyboardLateralInput, -1, 1);

      if (Math.abs(forwardInput) > 0 || Math.abs(lateralInput) > 0) {
        const distanceForward = forwardInput >= 0
          ? forwardInput * MOBILE_MOTION_MOVE_MAX_DISTANCE_FORWARD
          : forwardInput * MOBILE_MOTION_MOVE_MAX_DISTANCE_BACKWARD;
        const distanceLateral = lateralInput * MOBILE_MOTION_MOVE_MAX_DISTANCE_LATERAL;
        motionForwardVector.copy(motionState.anchorForward);
        motionRightVector.set(0, 1, 0).cross(motionForwardVector).normalize();
        motionOffsetVector.set(0, 0, 0);
        motionOffsetVector.addScaledVector(motionForwardVector, distanceForward);
        motionOffsetVector.addScaledVector(motionRightVector, distanceLateral);
        orbitTarget.copy(motionState.anchorOrbitTarget).add(motionOffsetVector);
        orbitDistance = motionState.anchorOrbitDistance;
        const rotateLimitRad = THREE.MathUtils.degToRad(MOBILE_MOTION_ROTATE_MAX_DEG);
        orbitYaw = motionState.anchorOrbitYaw - yawInput * rotateLimitRad;
        orbitPitch = THREE.MathUtils.clamp(
          motionState.anchorOrbitPitch + pitchInput * rotateLimitRad,
          -Math.PI / 2 + 0.05,
          Math.PI / 2 - 0.05,
        );
        applyOrbit();
        moved = motionOffsetVector.lengthSq() > 1e-12;
      } else if (!rotated) {
        orbitTarget.copy(motionState.anchorOrbitTarget);
        orbitDistance = motionState.anchorOrbitDistance;
        orbitYaw = motionState.anchorOrbitYaw;
        orbitPitch = THREE.MathUtils.clamp(
          motionState.anchorOrbitPitch,
          -Math.PI / 2 + 0.05,
          Math.PI / 2 - 0.05,
        );
        applyOrbit();
      }

      return { rotated, moved };
    }

    function applyOrbit() {
      const cosPitch = Math.cos(orbitPitch);
      const sinPitch = Math.sin(orbitPitch);
      const cosYaw = Math.cos(orbitYaw);
      const sinYaw = Math.sin(orbitYaw);
      const offset = new THREE.Vector3(
        orbitDistance * sinYaw * cosPitch,
        orbitDistance * sinPitch,
        orbitDistance * cosYaw * cosPitch,
      );
      camera.position.copy(orbitTarget).add(offset);
      camera.lookAt(orbitTarget);
    }

    function syncOrbitFromCamera() {
      const offset = camera.position.clone().sub(orbitTarget);
      orbitDistance = Math.max(0.1, offset.length());
      if (orbitDistance <= 0) {
        orbitYaw = 0;
        orbitPitch = 0;
        return;
      }
      orbitYaw = Math.atan2(offset.x, offset.z);
      orbitPitch = Math.asin(THREE.MathUtils.clamp(offset.y / orbitDistance, -1, 1));
    }

    function resetView() {
      if (!hasInitialOrbit) return;
      orbitTarget.copy(initialOrbitTarget);
      orbitYaw = initialOrbitYaw;
      orbitPitch = initialOrbitPitch;
      const sc = getOrbitDistanceAspectScale();
      orbitDistance = initialOrbitDistance * sc;
      lastOrbitAspectScale = sc;
      applyOrbit();
      lastCameraPos.copy(camera.position);
      if (motionState.enabled) {
        resetMotionBaseline();
        resetMotionAnchor();
      }
      // Recenter also re-acquires the XR safe-viewing-zone anchor so the
      // viewer can clear an out-of-bounds blur by tapping the recenter button.
      resetHeadAnchor();
    }

    function resetViewState() {

    }

    window.addEventListener('keydown', (event) => {

    function resize() {
      const width = frameEl.clientWidth;
      const height = frameEl.clientHeight;

      const canvas = renderer.domElement;
      const pr = getClampedDevicePixelRatio();

        renderer.setPixelRatio(pr);
      }
      const expectedW = Math.floor(width * renderer.getPixelRatio());
      const expectedH = Math.floor(height * renderer.getPixelRatio());
      const needResize = canvas.width !== expectedW || canvas.height !== expectedH;

      if (needResize) {
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      if (hasInitialOrbit && !renderer.xr.isPresenting && width > 0 && height > 0) {
        const newSc = getOrbitDistanceAspectScale();
        const prev = lastOrbitAspectScale;
        if (Number.isFinite(prev) && prev > 1e-6) {
          orbitDistance *= newSc / prev;
        }
        lastOrbitAspectScale = newSc;
        applyOrbit();
        lastCameraPos.copy(camera.position);
      } else if (width > 0 && height > 0) {
        lastOrbitAspectScale = getOrbitDistanceAspectScale();
      }

      if (!renderer.xr.isPresenting) {
        applyCameraFovForAspect();
      }
    }

    const resizeObserver = new ResizeObserver(() => {

    const SHORT_MAX_FRAMES = 16;
    const MEDIUM_MAX_FRAMES = 32;
    const FRAME_LIMIT_MODE_SHORT = 'short';
    const FRAME_LIMIT_MODE_MEDIUM = 'medium';
    const FRAME_LIMIT_MODE_LONG = 'long';
    const IS_IOS_DEVICE = /iPad|iPhone|iPod/.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const XR_PRELOAD_AHEAD_FRAMES = 0;
    const XR_MAX_RESIDENT_MESHES = Number.POSITIVE_INFINITY;
    const XR_WARMUP_FRAMES = Number.POSITIVE_INFINITY;
    const IOS_PRELOAD_AHEAD_FRAMES = 2;
    const IOS_MAX_RESIDENT_MESHES = 6;
    const DESKTOP_PRELOAD_AHEAD_FRAMES = 6;
    const DESKTOP_MAX_RESIDENT_MESHES = 18;
    const IOS_WARMUP_BYTE_CONCURRENCY = 2;
    const DESKTOP_WARMUP_BYTE_CONCURRENCY = 2;
    const IOS_CACHE_SCENE_CONCURRENCY = 2;
    const DESKTOP_CACHE_SCENE_CONCURRENCY = 2;
    const IOS_CACHE_FRAME_BYTE_CONCURRENCY = 2;
    const DESKTOP_CACHE_FRAME_BYTE_CONCURRENCY = 2;
    let maxFramesMode = FRAME_LIMIT_MODE_MEDIUM;
    let maxFramesToLoad = MEDIUM_MAX_FRAMES;

    function getRuntimeMemoryPolicy() {
      if (renderer.xr.isPresenting) {
        return {
          preloadAheadFrames: XR_PRELOAD_AHEAD_FRAMES,
          maxResidentMeshes: XR_MAX_RESIDENT_MESHES,
          releaseBytesAfterMesh: true,
          warmupFrameCount: XR_WARMUP_FRAMES,
        };
      }
      if (IS_IOS_DEVICE) {
        return {
          preloadAheadFrames: DESKTOP_PRELOAD_AHEAD_FRAMES,
          maxResidentMeshes: (
            maxFramesMode === FRAME_LIMIT_MODE_LONG
            || maxFramesMode === FRAME_LIMIT_MODE_MEDIUM
          )
            ? Number.POSITIVE_INFINITY
            : DESKTOP_MAX_RESIDENT_MESHES,
          releaseBytesAfterMesh: false,
          warmupFrameCount: Number.POSITIVE_INFINITY,
        };
      }
      return {
        preloadAheadFrames: DESKTOP_PRELOAD_AHEAD_FRAMES,
        maxResidentMeshes: (
          maxFramesMode === FRAME_LIMIT_MODE_LONG
          || maxFramesMode === FRAME_LIMIT_MODE_MEDIUM
        )
          ? Number.POSITIVE_INFINITY
          : DESKTOP_MAX_RESIDENT_MESHES,
        releaseBytesAfterMesh: false,
        warmupFrameCount: Number.POSITIVE_INFINITY,
      };
    }

    function parseFrameLimitMode(value) {
      const raw = String(value ?? '').trim().toLowerCase();
      if (raw === FRAME_LIMIT_MODE_MEDIUM || raw === '32') {
        return FRAME_LIMIT_MODE_MEDIUM;
      }
      if (raw === FRAME_LIMIT_MODE_LONG || raw === 'all' || raw === 'infinity') {
        return FRAME_LIMIT_MODE_LONG;
      }
      const parsed = Number.parseInt(raw, 10);
      if (Number.isFinite(parsed) && parsed > MEDIUM_MAX_FRAMES) {
        return FRAME_LIMIT_MODE_LONG;
      }
      if (parsed === MEDIUM_MAX_FRAMES) {
        return FRAME_LIMIT_MODE_MEDIUM;
      }
      return FRAME_LIMIT_MODE_SHORT;
    }

    function applyFrameLimitMode(mode) {
      if (mode === FRAME_LIMIT_MODE_LONG) {
        maxFramesMode = FRAME_LIMIT_MODE_LONG;
        maxFramesToLoad = Number.POSITIVE_INFINITY;
        return;
      }
      if (mode === FRAME_LIMIT_MODE_MEDIUM) {
        maxFramesMode = FRAME_LIMIT_MODE_MEDIUM;
        maxFramesToLoad = MEDIUM_MAX_FRAMES;
        return;
      }
      maxFramesMode = FRAME_LIMIT_MODE_SHORT;
      maxFramesToLoad = SHORT_MAX_FRAMES;
    }

    function limitFrames(list) {

    let params = new URLSearchParams(document.location.search);

    // ── Debug panel ──────────────────────────────────────────────────────────
    let debugVisible = false;

    const debugRenderSize = new THREE.Vector2();

    function getCurrentRenderResolution(isInVR) {
      if (isInVR) {
        const xrCam = renderer.xr.getCamera();
        const xrViews = Array.isArray(xrCam?.cameras) ? xrCam.cameras : [];
        const eyeViewports = xrViews
          .map((eyeCam) => eyeCam?.viewport)
          .filter((vp) => Number.isFinite(vp?.width) && Number.isFinite(vp?.height) && vp.width > 0 && vp.height > 0);
        if (eyeViewports.length > 0) {
          const totalW = Math.round(eyeViewports.reduce((sum, vp) => sum + vp.width, 0));
          const totalH = Math.round(eyeViewports.reduce((maxH, vp) => Math.max(maxH, vp.height), 0));
          const avgEyeW = Math.round(totalW / eyeViewports.length);
          const avgEyeH = Math.round(eyeViewports.reduce((sum, vp) => sum + vp.height, 0) / eyeViewports.length);
          const text = eyeViewports.length > 1
            ? `${avgEyeW}×${avgEyeH} per-eye (total ${totalW}×${totalH})`
            : `${avgEyeW}×${avgEyeH}`;
          return { w: avgEyeW, h: avgEyeH, text };
        }

        const xrSession = renderer.xr.getSession();
        const xrLayer = xrSession?.renderState?.baseLayer || null;
        const fbWidth = Number(xrLayer?.framebufferWidth);
        const fbHeight = Number(xrLayer?.framebufferHeight);
        if (Number.isFinite(fbWidth) && Number.isFinite(fbHeight) && fbWidth > 0 && fbHeight > 0) {
          const w = Math.round(fbWidth);
          const h = Math.round(fbHeight);
          return { w, h, text: `${w}×${h} layer` };
        }
      }

      renderer.getDrawingBufferSize(debugRenderSize);
      const w = Math.max(1, Math.round(debugRenderSize.x || renderer.domElement.width || 1));
      const h = Math.max(1, Math.round(debugRenderSize.y || renderer.domElement.height || 1));
      return { w, h, text: `${w}×${h}` };
    }

    function updateDebugPanel(measuredFps) {
      const isInVR = renderer.xr.isPresenting;
      if (!debugPanelEl && !isInVR) return;

      if (debugFpsEl) debugFpsEl.textContent = `FPS: ${measuredFps}`;

      const { w, h, text } = getCurrentRenderResolution(isInVR);
      if (debugResEl) debugResEl.textContent = `RES: ${text}`;

      const sceneFov = Math.round(camera.fov);
      let fovText;
      if (isInVR) {
        const xrCam = renderer.xr.getCamera();
        if (xrCam && xrCam.cameras && xrCam.cameras.length > 0) {
          const firstEyeCam = xrCam.cameras[0];
          const m = firstEyeCam?.projectionMatrix?.elements;
          const m11 = Number(m?.[5]);
          if (Number.isFinite(m11) && Math.abs(m11) > 1e-6) {

            fovText = `FOV: ${sceneFov}° / HMD: ${hmdFovV}°`;
          } else {
            fovText = `FOV: ${sceneFov}°`;
          }
        } else {
          fovText = `FOV: ${sceneFov}°`;
        }
        if (debugFovEl) debugFovEl.textContent = fovText;
        drawVrDebugHud(measuredFps, w, h, fovText);

        fovText = `FOV: ${sceneFov}°`;

      }

    function updateSpatialToggleButtonUI() {

    const BG_MUSIC_URL_CANDIDATES = [
      './public/audio/bg-music.mp3',
    ];
    const BG_MUSIC_VOLUME = 0.28;
    const audioListener = new THREE.AudioListener();
    camera.add(audioListener);
    const backgroundMusic = new THREE.Audio(audioListener);
    backgroundMusic.setLoop(true);
    backgroundMusic.setVolume(BG_MUSIC_VOLUME);
    const audioLoader = new THREE.AudioLoader();
    let isMusicEnabled = true;
    let backgroundMusicReady = false;
    let backgroundMusicLoadPromise = null;
    let backgroundMusicLoadFailed = false;
    let currentMusicUrl = '';
    let activeSceneMusicCandidates = [...BG_MUSIC_URL_CANDIDATES];
    const musicBufferCache = new Map();

    function getSceneNameFromDirectory(dirUrl) {
      const normalized = normalizeDirectoryUrl(dirUrl);
      const parts = normalized.split('/').filter(Boolean);
      return parts[parts.length - 1] || '';
    }

    const PORTRAIT_SCENES = new Set(['TikTok_Dance', 'Cindy']);

    function isPortraitSceneDirectory(dirUrl) {

    function getSceneMusicUrl(sceneName) {
      const normalized = String(sceneName || '').trim();
      if (!normalized) return '';
      return `./public/${normalized}/music.mp3`;
    }

    function buildMusicCandidatesForScene(sceneName) {
      const candidates = [];
      const sceneMusic = getSceneMusicUrl(sceneName);
      if (sceneMusic) candidates.push(sceneMusic);
      for (const fallbackUrl of BG_MUSIC_URL_CANDIDATES) {
        if (!candidates.includes(fallbackUrl)) candidates.push(fallbackUrl);
      }
      return candidates;
    }

    function applySceneMusicByDirectory(dirUrl) {
      const sceneName = getSceneNameFromDirectory(dirUrl);
      const nextCandidates = buildMusicCandidatesForScene(sceneName);
      const sameList = nextCandidates.length === activeSceneMusicCandidates.length
        && nextCandidates.every((url, idx) => url === activeSceneMusicCandidates[idx]);
      if (sameList) return;
      if (currentMusicUrl && nextCandidates[0] === currentMusicUrl) {
        activeSceneMusicCandidates = nextCandidates;
        return;
      }
      activeSceneMusicCandidates = nextCandidates;
      backgroundMusicReady = false;
      backgroundMusicLoadFailed = false;
      backgroundMusicLoadPromise = null;
      currentMusicUrl = '';
      isMusicEnabled = true;
      if (backgroundMusic.isPlaying) {
        backgroundMusic.stop();

    function updateMusicButtonUI() {
