  <script type="module">

    // ── i18n ──────────────────────────────────────────────────────────────
    const LANG_STORAGE_KEY = 'pico-ui-language';
    function normalizeLanguageCode(raw) { const v = String(raw || '').trim().toLowerCase(); if (v.startsWith('zh')) return 'zh'; if (v.startsWith('en')) return 'en'; return ''; }
    function resolveUiLanguage() {

    const I18N_TEXT = {
      en: { heroTitle:'PICO 6DoF Player', dragDrop:'Drag and drop splat (.ply, .sog, .spz, .splat, .ksplat) here', shortFrames:'Short (16 Frames)', mediumFrames:'Medium (32 Frames)', longFrames:'Long (All Frames)', reset:'Recenter', spatialLabel:'Spatial', play:'Play', pause:'Pause', enterVr:'Enter VR', exitVr:'Exit VR', loadingScenePreviews:'Loading scene previews...', scenePreviewsUnavailable:'Scene previews unavailable', noScenePreviews:'No scene previews found', noPreview:'No preview', cache:'Cache All', noScenesFound:'No scenes found', cachingProgress:'Caching {done}/{total}', cachedProgress:'Cached {done}/{total}', noSplatFilesAtUrl:'No splat files found', failedToLoadScene:'Failed to load scene: {message}', language:'Language', langZh:'中文', langEn:'English', prevScene:'Previous scene', nextScene:'Next scene', debugLabel:'Debug', musicLabel:'Music', selectFolder:'Select folder...', loadingFolders:'Loading folders...', folderUnavailable:'Folder list unavailable', noFolders:'No folders', frameRange:'Frame range' },
      zh: { heroTitle:'PICO 6DoF 播放器', dragDrop:'将 splat (.ply, .sog, .spz, .splat, .ksplat) 拖拽到这里', shortFrames:'短（16 帧）', mediumFrames:'中（32 帧）', longFrames:'长（全部帧）', reset:'回中', spatialLabel:'空间', play:'播放', pause:'暂停', enterVr:'进入 VR', exitVr:'退出 VR', loadingScenePreviews:'正在加载预览...', scenePreviewsUnavailable:'场景预览不可用', noScenePreviews:'暂无场景预览', noPreview:'暂无预览', cache:'缓存所有', noScenesFound:'未找到场景', cachingProgress:'缓存中 {done}/{total}', cachedProgress:'已缓存 {done}/{total}', noSplatFilesAtUrl:'未找到 splat 文件', failedToLoadScene:'场景加载失败：{message}', language:'语言', langZh:'中文', langEn:'English', prevScene:'上一个场景', nextScene:'下一个场景', debugLabel:'调试', musicLabel:'音乐', selectFolder:'选择场景...', loadingFolders:'正在加载场景...', folderUnavailable:'场景列表不可用', noFolders:'暂无场景', frameRange:'帧范围' },
    };
    const SCENE_NAME_I18N = { '仓大佬跳舞':{ zh:'仓大佬跳舞', en:'Cang Dance' }, '动物世界':{ zh:'动物世界', en:'Animal World' }, '少年派':{ zh:'少年派', en:'Life of Pi' }, '直播美女':{ zh:'直播美女', en:'Live Beauty' }, '网课':{ zh:'网课', en:'Online Class' } };
    function t(key, vars = {}) { const table = I18N_TEXT[UI_LANG] || I18N_TEXT.en; const fb = I18N_TEXT.en; const tpl = table[key] ?? fb[key] ?? key; return String(tpl).replace(/\{(\w+)\}/g, (_, tok) => Object.hasOwn(vars, tok) ? String(vars[tok]) : `{${tok}}`); }
    function localizeSceneName(raw) { const k = String(raw||'').trim(); if (!k) return ''; const e = SCENE_NAME_I18N[k]; return e ? (e[UI_LANG]||e.en||k) : k; }
    function applyStaticI18n() {
      document.querySelectorAll('[data-i18n-key]').forEach(el => { const k = el.dataset.i18nKey; if (k) el.textContent = t(k); });
      document.querySelectorAll('[data-i18n-aria-label]').forEach(el => { const k = el.dataset.i18nAriaLabel; if (k) el.setAttribute('aria-label', t(k)); });
      document.querySelectorAll('[data-i18n-title]').forEach(el => { const k = el.dataset.i18nTitle; if (k) el.setAttribute('title', t(k)); });
    }

    function isSogFile(fileName) {
      return String(fileName || '').toLowerCase().endsWith('.sog');
    }

    // ── VR Framebuffer Scale ──────────────────────────────────────────────
    const VR_FB_SCALE = 1.0;
    if (typeof XRWebGLLayer !== 'undefined') {
      const _OrigXRWebGLLayer = XRWebGLLayer;
      window.XRWebGLLayer = function(session, ctx, opts = {}) {
        opts.framebufferScaleFactor = VR_FB_SCALE;
        return new _OrigXRWebGLLayer(session, ctx, opts);
      };
      window.XRWebGLLayer.prototype = _OrigXRWebGLLayer.prototype;
      window.XRWebGLLayer.getNativeFramebufferScaleFactor = _OrigXRWebGLLayer.getNativeFramebufferScaleFactor;
    }

    // ── PlayCanvas Engine Setup ──────────────────────────────────────────
    const canvasEl = document.querySelector('.viewer-canvas');
    const frameEl = document.querySelector('.window-frame');

    const app = new pc.Application(canvasEl, {
      mouse: new pc.Mouse(canvasEl),
      touch: new pc.TouchDevice(canvasEl),
      keyboard: new pc.Keyboard(window),
      graphicsDeviceOptions: { alpha: false, powerPreference: 'high-performance' },
    });

    app.setCanvasFillMode(pc.FILLMODE_NONE);
    app.setCanvasResolution(pc.RESOLUTION_AUTO);
    app.autoRender = false;
    app.resizeCanvas(1, 1);

    const cameraEntity = new pc.Entity('camera');
    cameraEntity.addComponent('camera', {
      fov: 30,
      nearClip: 0.01,
      farClip: 1000,
      clearColor: new pc.Color(0, 0, 0),
    });
    app.root.addChild(cameraEntity);
    cameraEntity.setPosition(0, 0, 0.1);
    cameraEntity.lookAt(0, 0, 0);

    const localFrame = new pc.Entity('localFrame');
    app.root.addChild(localFrame);

    // ── VR Window Frame ────────────────────────────────────────────────
    const VR_FRAME_DIST = 1.5;
    const VR_ASPECT = 16 / 9;
    const VR_DEFAULT_WIN_W = 0.84, VR_DEFAULT_WIN_H = 0.84 / VR_ASPECT;
    const VR_MIN_WIN_W = 0.5, VR_MAX_WIN_W = 1.7;
    const VR_MASK_CW = 1600, VR_MASK_CH = 900;
    const VR_MASK_PLANE_W = 5.0, VR_MASK_PLANE_H = 5.0 / VR_ASPECT;
    let vrWinW = VR_DEFAULT_WIN_W, vrWinH = VR_DEFAULT_WIN_H;

    let savedLocalFramePos = new pc.Vec3();
    let vrFrameInitialized = false;
    let vrInitWaitFrames = 0;
    let pendingVrRefit = false;

    const vrFrameGroup = new pc.Entity('vrFrameGroup');
    vrFrameGroup.enabled = false;
    app.root.addChild(vrFrameGroup);

    const vrBackground = new pc.Entity('vrBackground');
    vrBackground.addComponent('render', { type: 'plane' });
    vrBackground.setLocalEulerAngles(90, 0, 0);
    vrBackground.setLocalPosition(0, 0, -VR_FRAME_DIST - 0.001);
    vrBackground.setLocalScale(VR_DEFAULT_WIN_W, 1, VR_DEFAULT_WIN_H);
    const vrBgMat = new pc.StandardMaterial();
    vrBgMat.diffuse = new pc.Color(0, 0, 0);
    vrBgMat.emissive = new pc.Color(0, 0, 0);
    vrBgMat.useLighting = false;
    vrBgMat.depthTest = false;
    vrBgMat.depthWrite = false;
    vrBgMat.cull = pc.CULLFACE_NONE;
    vrBgMat.update();
    vrBackground.render.meshInstances.forEach(mi => { mi.material = vrBgMat; mi.drawOrder = 9997; });
    vrFrameGroup.addChild(vrBackground);

    const vrMaskCanvas = document.createElement('canvas');
    vrMaskCanvas.width = VR_MASK_CW;
    vrMaskCanvas.height = VR_MASK_CH;
    const vrMaskCtx = vrMaskCanvas.getContext('2d');

    const vrMaskTexture = new pc.Texture(app.graphicsDevice, {
      width: VR_MASK_CW, height: VR_MASK_CH,
      format: pc.PIXELFORMAT_RGBA8, mipmaps: false,
      minFilter: pc.FILTER_LINEAR, magFilter: pc.FILTER_LINEAR,
    });

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawVrMask(openW) {
      vrWinW = Math.max(VR_MIN_WIN_W, Math.min(VR_MAX_WIN_W, Number(openW) || VR_DEFAULT_WIN_W));
      vrWinH = vrWinW / VR_ASPECT;
      vrBackground.setLocalScale(vrWinW, 1, vrWinH);

      const holePixW = (vrWinW / VR_MASK_PLANE_W) * VR_MASK_CW;
      const holePixH = (vrWinH / VR_MASK_PLANE_H) * VR_MASK_CH;
      const holeX = (VR_MASK_CW - holePixW) / 2;
      const holeY = (VR_MASK_CH - holePixH) / 2;
      const holeRad = Math.max(20, Math.min(120, Math.min(holePixW, holePixH) * 0.12));

      vrMaskCtx.clearRect(0, 0, VR_MASK_CW, VR_MASK_CH);
      vrMaskCtx.fillStyle = 'rgba(0, 0, 0, 1)';
      vrMaskCtx.fillRect(0, 0, VR_MASK_CW, VR_MASK_CH);

      vrMaskCtx.globalCompositeOperation = 'destination-out';
      vrMaskCtx.fillStyle = '#000';
      roundRect(vrMaskCtx, holeX, holeY, holePixW, holePixH, holeRad);
      vrMaskCtx.fill();
      vrMaskCtx.globalCompositeOperation = 'source-over';

      vrMaskCtx.strokeStyle = 'rgba(180, 180, 180, 0.6)';
      vrMaskCtx.lineWidth = 3 * (VR_MASK_CW / 1600);
      roundRect(vrMaskCtx, holeX, holeY, holePixW, holePixH, holeRad);
      vrMaskCtx.stroke();

      vrMaskTexture.setSource(vrMaskCanvas);
    }

    const vrMaskMat = new pc.StandardMaterial();
    vrMaskMat.emissiveMap = vrMaskTexture;
    vrMaskMat.emissive = new pc.Color(1, 1, 1);
    vrMaskMat.opacityMap = vrMaskTexture;
    vrMaskMat.opacityMapChannel = 'a';
    vrMaskMat.blendType = pc.BLEND_NORMAL;
    vrMaskMat.useLighting = false;
    vrMaskMat.depthTest = false;
    vrMaskMat.depthWrite = false;
    vrMaskMat.cull = pc.CULLFACE_NONE;
    vrMaskMat.update();

    const vrMask = new pc.Entity('vrMask');
    vrMask.addComponent('render', { type: 'plane' });
    vrMask.setLocalEulerAngles(90, 0, 0);
    vrMask.setLocalPosition(0, 0, -VR_FRAME_DIST);
    vrMask.setLocalScale(VR_MASK_PLANE_W, 1, VR_MASK_PLANE_H);
    vrMask.render.meshInstances.forEach(mi => { mi.material = vrMaskMat; mi.drawOrder = 9998; });
    vrFrameGroup.addChild(vrMask);

    drawVrMask(VR_DEFAULT_WIN_W);

    // ── VR Debug HUD (3D plane in the VR scene) ─────────────────────────
    const VR_HUD_CW = 1024, VR_HUD_CH = 480;
    const vrDebugCanvas = document.createElement('canvas');
    vrDebugCanvas.width = VR_HUD_CW;
    vrDebugCanvas.height = VR_HUD_CH;
    const vrDebugTexture = new pc.Texture(app.graphicsDevice, {
      width: VR_HUD_CW, height: VR_HUD_CH,
      format: pc.PIXELFORMAT_RGBA8, mipmaps: false,
      minFilter: pc.FILTER_LINEAR, magFilter: pc.FILTER_LINEAR,
    });
    const vrDebugMat = new pc.StandardMaterial();
    vrDebugMat.emissiveMap = vrDebugTexture;
    vrDebugMat.emissive = new pc.Color(1, 1, 1);
    vrDebugMat.opacityMap = vrDebugTexture;
    vrDebugMat.opacityMapChannel = 'a';
    vrDebugMat.blendType = pc.BLEND_NORMAL;
    vrDebugMat.useLighting = false;
    vrDebugMat.depthTest = false;
    vrDebugMat.depthWrite = false;
    vrDebugMat.cull = pc.CULLFACE_NONE;
    vrDebugMat.update();

    const vrDebugHud = new pc.Entity('vrDebugHud');
    vrDebugHud.addComponent('render', { type: 'plane' });
    vrDebugHud.setLocalEulerAngles(90, 0, 0);
    vrDebugHud.setLocalScale(0.32, 1, 0.15);
    vrDebugHud.enabled = false;
    vrDebugHud.render.meshInstances.forEach(mi => { mi.material = vrDebugMat; mi.drawOrder = 9999; });
    vrFrameGroup.addChild(vrDebugHud);

    function drawVrDebugHud(fps, resW, resH, fovDeg) {
      const ctx = vrDebugCanvas.getContext('2d');
      if (!ctx) return;
      ctx.clearRect(0, 0, VR_HUD_CW, VR_HUD_CH);
      ctx.fillStyle = 'rgba(10,10,10,0.78)';
      roundRect(ctx, 0, 0, VR_HUD_CW, VR_HUD_CH, 36);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 4;
      roundRect(ctx, 2, 2, VR_HUD_CW - 4, VR_HUD_CH - 4, 34);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.font = 'bold 100px ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      ctx.fillText(`FPS: ${fps}`, 40, VR_HUD_CH * 0.20);
      ctx.fillText(`RES: ${resW}\u00d7${resH}`, 40, VR_HUD_CH * 0.53);
      ctx.fillText(`FOV: ${fovDeg}\u00b0`, 40, VR_HUD_CH * 0.84);
      vrDebugTexture.setSource(vrDebugCanvas);
    }

    // ── VR Scene Centering ──────────────────────────────────────────────
    function centerSplatInVrWindow() {
      if (!loadedSplatEntity || !loadedSplatEntity.enabled) return;
      const worldMat = loadedSplatEntity.getWorldTransform();
      const splatWorldCenter = new pc.Vec3();
      worldMat.transformPoint(pc.Vec3.ZERO, splatWorldCenter);

      const fgPos = vrFrameGroup.getPosition();
      const dx = splatWorldCenter.x - fgPos.x;
      const dy = splatWorldCenter.y - fgPos.y;
      if (Math.abs(dx) + Math.abs(dy) < 1e-6) return;

      const curPos = localFrame.getPosition();
      localFrame.setPosition(curPos.x - dx, curPos.y - dy, curPos.z);
    }

    function fitVrWindowToSplat() {
      if (!loadedSplatEntity || !loadedSplatEntity.enabled) {
        drawVrMask(VR_DEFAULT_WIN_W);
        return;
      }
      centerSplatInVrWindow();

      const worldMat = loadedSplatEntity.getWorldTransform();
      const localBounds = [
        new pc.Vec3(-0.5, -0.5, -0.5), new pc.Vec3(0.5, -0.5, -0.5),
        new pc.Vec3(-0.5, 0.5, -0.5),  new pc.Vec3(0.5, 0.5, -0.5),
        new pc.Vec3(-0.5, -0.5, 0.5),  new pc.Vec3(0.5, -0.5, 0.5),
        new pc.Vec3(-0.5, 0.5, 0.5),   new pc.Vec3(0.5, 0.5, 0.5),
      ];
      const fgInvMat = new pc.Mat4();
      fgInvMat.copy(vrFrameGroup.getWorldTransform()).invert();
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      const tmp = new pc.Vec3();
      for (const lp of localBounds) {
        worldMat.transformPoint(lp, tmp);
        fgInvMat.transformPoint(tmp, tmp);
        if (tmp.x < minX) minX = tmp.x;
        if (tmp.x > maxX) maxX = tmp.x;
        if (tmp.y < minY) minY = tmp.y;
        if (tmp.y > maxY) maxY = tmp.y;
      }
      const spanX = Math.max(1e-4, maxX - minX);
      const spanY = Math.max(1e-4, maxY - minY);
      const fitW = Math.max(spanX, spanY * VR_ASPECT) * 0.9;
      drawVrMask(fitW);
      centerSplatInVrWindow();
    }

    // ── VR Setup ─────────────────────────────────────────────────────────
    const vrButton = document.createElement('button');
    vrButton.id = 'VRButton';
    vrButton.style.display = 'none';
    let isVrActive = false;

    function setupVR() {
      if (!app.xr || !app.xr.supported) return;
      if (app.xr.isAvailable(pc.XRTYPE_VR)) {
        vrButton.style.display = '';
      }
      app.xr.on('available:' + pc.XRTYPE_VR, (available) => {
        vrButton.style.display = available ? '' : 'none';
      });
      app.xr.on('start', () => {
        isVrActive = true;
        vrButton.setAttribute('aria-label', t('exitVr'));
        cancelCachingTask();
        stopPlayback();
        savedLocalFramePos.copy(localFrame.getPosition());
        cameraEntity.setLocalPosition(0, 0, 0);
        cameraEntity.camera.clearColorBuffer = false;
        localFrame.setPosition(0, 0, 0);
        localFrame.setEulerAngles(0, 0, 0);
        canvasEl.style.cssText = 'display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;';
        vrFrameGroup.enabled = true;
        vrFrameGroup.setPosition(0, 0, 0);
        vrFrameGroup.setEulerAngles(0, 0, 0);
        vrFrameInitialized = false;
        vrInitWaitFrames = 0;
        pendingVrRefit = true;
        drawVrMask(VR_DEFAULT_WIN_W);
      });
      app.xr.on('end', () => {
        isVrActive = false;
        vrButton.setAttribute('aria-label', t('enterVr'));
        canvasEl.style.cssText = 'display:block;position:absolute;top:0;left:0;width:100%;height:100%;';
        vrFrameGroup.enabled = false;
        vrFrameInitialized = false;
        pendingVrRefit = false;
        cameraEntity.setLocalPosition(0, 0, 0.1);
        cameraEntity.camera.clearColorBuffer = true;
        localFrame.setPosition(savedLocalFramePos.x, savedLocalFramePos.y, savedLocalFramePos.z);
        localFrame.setEulerAngles(0, 0, 0);
        resetViewState();
        if (isPlaying) scheduleNextPlaybackTick();
        const needsWarmup = frames.length > 0 && frames.some(f => f && !f.entity?._gpuReady);
        if (needsWarmup) startPlaybackAfterWarmup(frames);
      });
      vrButton.addEventListener('click', () => {
        if (app.xr.active) {
          app.xr.end();
        } else {
          app.xr.start(cameraEntity.camera, pc.XRTYPE_VR, pc.XRSPACE_LOCAL, {
            optionalFeatures: ['hand-tracking'],
          });
        }
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && app.xr.active) {
          e.preventDefault();
          app.xr.end();
        }
      });
    }

    // ── Orbit Camera ─────────────────────────────────────────────────────
    let orbitYaw = 0, orbitPitch = 0, orbitDistance = 0.1;
    let orbitTargetX = 0, orbitTargetY = 0, orbitTargetZ = 0;
    let initialOrbitYaw = 0, initialOrbitPitch = 0, initialOrbitDistance = 0.1;
    let initialTargetX = 0, initialTargetY = 0, initialTargetZ = 0;
    let hasInitialOrbit = false;

    function applyOrbit() {
      const cp = Math.cos(orbitPitch), sp = Math.sin(orbitPitch);
      const cy = Math.cos(orbitYaw), sy = Math.sin(orbitYaw);
      cameraEntity.setPosition(
        orbitTargetX + orbitDistance * sy * cp,

    // ── Frame entity management ──────────────────────────────────────────
    function hasUsableBytes(frame) { return frame && frame.bytes instanceof Uint8Array && frame.bytes.byteLength > 0; }

    async function ensureFrameBytes(index, fl = frames) {

    playBtn.addEventListener('click', () => togglePlaybackFromUi());

    const CANVAS_CLICK_THRESHOLD = 8;
    let canvasDownPos = null;
    canvasEl.addEventListener('pointerdown', (e) => { if (e.isPrimary && e.button === 0) canvasDownPos = { id: e.pointerId, x: e.clientX, y: e.clientY }; });
    canvasEl.addEventListener('pointerup', (e) => {
      if (!canvasDownPos || canvasDownPos.id !== e.pointerId) { canvasDownPos = null; return; }
      if (Math.hypot(e.clientX - canvasDownPos.x, e.clientY - canvasDownPos.y) <= CANVAS_CLICK_THRESHOLD) void togglePlaybackFromUi();
      canvasDownPos = null;
    });

    speedSelect.addEventListener('change', () => { const v = Number(speedSelect.value); if (Number.isFinite(v) && v > 0) { speedMultiplier = v; if (isPlaying) { stopPlayback(); startPlayback(); } } });
    fovSlider.addEventListener('input', () => updateFov(fovSlider.value));
    progressEl.addEventListener('input', () => { if (!frames.length) return; setPlaying(false); showFrame(Number(progressEl.value)||0); });
    resetBtn?.addEventListener('click', () => resetViewState());
    viewerCloseBtn?.addEventListener('click', async () => { if (app.xr?.active) app.xr.end(); showImportInterface(); });
    updateFov(cameraEntity.camera.fov);

    // ── switchToFrameList ────────────────────────────────────────────────
    function createSceneFramesFromUrls(urls) {
      return limitFrames(urls).map((u, i) => {
        const name = u.split('/').pop().split('?')[0];
        const p = extractFrameSequence(name);
        return { url: u, name, timeUnits: Number.isFinite(p) ? p : i, file: null, bytes: null, entity: null, entityPromise: null, bytesPromise: null };
      });
    }

    async function switchToFrameList(nextFrames, { warmup = false, ensureFirstBytes = false, showViewerEarly = false, viewerPreviewCandidates = [], releaseOnlyIfChanged = false } = {}) {
      cancelCachingTask();
      const prev = frames; frames = nextFrames; currentIndex = 0; setPlaying(false);
      if (!releaseOnlyIfChanged || prev !== frames) releaseFrameListResources(prev);
      if (!frames.length) return;
      if (showViewerEarly) { showViewerInterface(); showViewerPreviewOverlay(viewerPreviewCandidates); } else { hideViewerPreviewOverlay(); }
      if (ensureFirstBytes) { if (showViewerEarly) ensureFrameBytes(0, frames).catch(() => {}); else await ensureFrameBytes(0, frames); }
      await showFrame(0);
      resetViewState();
      if (!showViewerEarly) showViewerInterface();
      if (warmup) await startPlaybackAfterWarmup(frames);
    }

    // ── File drop/import ─────────────────────────────────────────────────
    function sortFilesByName(files) {
      return files.slice().sort((a, b) => {
        const aS = extractFrameSequence(a?.name), bS = extractFrameSequence(b?.name);
        if (Number.isFinite(aS) && Number.isFinite(bS) && aS !== bS) return aS - bS;
        return String(a?.name||'').localeCompare(String(b?.name||''), undefined, { numeric: true });
      });
    }

    async function loadSplatFiles(files) {
      applySceneMusic('');
      const ordered = sortFilesByName(files);
      const loaded = limitFrames(ordered.map(f => ({
        name: f.name, timeUnits: extractFrameSequence(f.name), file: f, bytes: null, entity: null, entityPromise: null, bytesPromise: null,
      })));
      await switchToFrameList(loaded, { warmup: true, ensureFirstBytes: true });
      setViewerSceneTitle(ordered[0]?.name?.replace(/\.[^.]+$/, '') || '');
    }

    const dropZoneEl = document.querySelector('.container');
    const dropUIEl = document.querySelector('.drop-zone');
    const onDragover = (e) => { e.preventDefault(); dropUIEl.classList.add('dragover'); };
    const onDragLeave = () => dropUIEl.classList.remove('dragover');
    const onDrop = (e) => { e.preventDefault(); dropUIEl.classList.remove('dragover'); const f = Array.from(e.dataTransfer.files||[]); if (f.length) loadSplatFiles(f); };
    dropZoneEl.addEventListener('dragover', onDragover);
    canvasEl.addEventListener('dragover', onDragover);
    dropZoneEl.addEventListener('dragleave', onDragLeave);
    canvasEl.addEventListener('dragleave', onDragLeave);
    dropZoneEl.addEventListener('drop', onDrop);
    canvasEl.addEventListener('drop', onDrop);
    const fileInput = document.querySelector('#file-input');
    fileInput.onchange = (e) => { const f = Array.from(e.target.files||[]); if (f.length) loadSplatFiles(f); e.target.value = ''; };
    dropUIEl.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });

    // ── Scene Catalog ────────────────────────────────────────────────────
    const SPLAT_EXTS = ['.ply', '.spz', '.splat', '.ksplat', '.sog'];
    const SCENES_API_URL = './api/scenes';
    let sceneCatalogPromise = null;
    const sceneCache = new Map();

    async function loadSceneCatalog() {
      if (sceneCatalogPromise) return sceneCatalogPromise;
      sceneCatalogPromise = (async () => {
        try { const r = await fetch(SCENES_API_URL, { cache: 'no-store' }); if (r.ok) { const p = await r.json(); if (p?.scenes) return p.scenes; } return {}; }
        catch { return {}; }
      })();
      return sceneCatalogPromise;
    }

    function extractSceneUrls(config) {
      if (typeof config === 'string') return [config];
      if (Array.isArray(config)) return config;
      if (!config || typeof config !== 'object') return [];
      if (Array.isArray(config.urls)) return config.urls;
      if (typeof config.urls === 'string') return [config.urls];
      if (typeof config.baseUrl === 'string' && Array.isArray(config.files)) {
        const base = config.baseUrl.endsWith('/') ? config.baseUrl : config.baseUrl + '/';
        return config.files.map(n => base + n);
      }
      return [];
    }

    function normalizeDirectoryUrl(input) { let d = (input||'').trim(); if (!d) return '/'; if (!d.startsWith('/')) d = '/' + d; if (!d.endsWith('/')) d += '/'; return d; }
    function normalizeCatalogKey(input) { return normalizeDirectoryUrl(input).replace(/^\/+|\/+$/g, ''); }
    function getSceneCacheKey(dir) { return `${normalizeDirectoryUrl(dir)}::${maxFramesMode}`; }

    async function discoverSplatFiles(dirUrl) {
      const key = normalizeCatalogKey(dirUrl);
      const catalog = await loadSceneCatalog();
      const config = catalog[key]; if (!config) return [];
      return limitFrames(extractSceneUrls(config).filter(u => typeof u === 'string' && SPLAT_EXTS.some(ext => u.toLowerCase().endsWith(ext))));
    }

    function getDirectoryDisplayName(dirUrl) { const parts = normalizeDirectoryUrl(dirUrl).split('/').filter(Boolean); const raw = parts[parts.length-1]||''; return localizeSceneName(raw) || raw; }

    async function loadSceneByDirectory(dirUrl, { viewerPreviewCandidates = [], selectionRequestId = null } = {}) {
      const norm = normalizeDirectoryUrl(dirUrl);
      if (selectionRequestId != null && selectionRequestId !== sceneSelectionRequestId) return;
      const cacheKey = getSceneCacheKey(norm);
      let entry = sceneCache.get(cacheKey);
      if (!entry) { const urls = await discoverSplatFiles(norm); if (selectionRequestId != null && selectionRequestId !== sceneSelectionRequestId) return; entry = { dir: norm, frames: createSceneFramesFromUrls(urls) }; sceneCache.set(cacheKey, entry); }
      await switchToFrameList(entry.frames, { warmup: true, ensureFirstBytes: true, releaseOnlyIfChanged: true, showViewerEarly: true, viewerPreviewCandidates });
      if (selectionRequestId != null && selectionRequestId !== sceneSelectionRequestId) return;
      setViewerSceneTitle(getDirectoryDisplayName(norm));
    }

    // ── Scene Preview Grid ───────────────────────────────────────────────
    const scenePreviewGridEl = document.querySelector('.scene-preview-grid');
    const cacheAllBtnEl = document.querySelector('.cache-all-button');
    const cacheAllProgressEl = document.querySelector('.cache-all-progress');
    const cacheAllLabelEl = document.querySelector('.cache-all-label');
    let selectedSceneDirectory = '';
    const scenePreviewByDirectory = new Map();
    let sceneSelectionRequestId = 0;
    let cacheButtonIdleLabel = t('cache');
    let cacheLabelAnimTimer = null, cacheAllLabelTextEl = null, cacheAllLabelDotsEl = null;
    let sceneDirectoryList = [];

    function ensureCacheLabelParts() {
      if (!cacheAllLabelEl || (cacheAllLabelTextEl && cacheAllLabelDotsEl)) return;
      cacheAllLabelEl.innerHTML = '';
      cacheAllLabelTextEl = document.createElement('span'); cacheAllLabelTextEl.className = 'cache-all-label-text';
      cacheAllLabelDotsEl = document.createElement('span'); cacheAllLabelDotsEl.className = 'cache-all-label-dots';
      cacheAllLabelEl.appendChild(cacheAllLabelTextEl); cacheAllLabelEl.appendChild(cacheAllLabelDotsEl);
    }
    function setCacheLabel(base, dots = '') { ensureCacheLabelParts(); if (cacheAllLabelTextEl) cacheAllLabelTextEl.textContent = base; if (cacheAllLabelDotsEl) cacheAllLabelDotsEl.textContent = dots; }
    function stopCacheLabelAnimation() { if (cacheLabelAnimTimer) { clearInterval(cacheLabelAnimTimer); cacheLabelAnimTimer = null; } }
    function startCacheLabelAnimation(base) { stopCacheLabelAnimation(); ensureCacheLabelParts(); let f = 0; const dots = ['','.','..','...']; setCacheLabel(base, dots[1]); cacheLabelAnimTimer = setInterval(() => { f = (f+1)%4; setCacheLabel(base, dots[f]); }, 350); }
    function setCacheButtonState({ label = t('cache'), progress = 0, disabled = false, isCaching: ic = false } = {}) {
      if (ic) startCacheLabelAnimation(label); else { stopCacheLabelAnimation(); setCacheLabel(label); }
      if (cacheAllProgressEl) { let p = Math.max(0, Math.min(100, progress)); if (ic && p < 10) p = 10; cacheAllProgressEl.style.width = `${p}%`; }
      if (cacheAllBtnEl) { cacheAllBtnEl.disabled = disabled; cacheAllBtnEl.classList.toggle('is-caching', ic); }
    }
    function setScenePreviewStatus(text) { if (!scenePreviewGridEl) return; scenePreviewGridEl.innerHTML = ''; const el = document.createElement('div'); el.className = 'scene-preview-status'; el.textContent = text; scenePreviewGridEl.appendChild(el); }
    function clearSceneCardLoadingState() { scenePreviewGridEl?.querySelectorAll('.scene-card.is-loading').forEach(c => c.classList.remove('is-loading')); }
    function syncScenePreviewSelection() { if (!scenePreviewGridEl) return; const ad = normalizeDirectoryUrl(selectedSceneDirectory); scenePreviewGridEl.querySelectorAll('.scene-card').forEach(c => { c.classList.toggle('is-selected', Boolean(ad && ad !== '/' && normalizeDirectoryUrl(c.dataset.dir||'') === ad)); }); }

    function getScenePreviewInfo(sceneName) {
      const primary = `./scenes/${sceneName}/0000.png`;
      return { primary, fallbacks: [] };
    }
    function getScenePreviewCandidatesForDirectory(dirUrl) {
      const info = scenePreviewByDirectory.get(normalizeDirectoryUrl(dirUrl)); if (!info) return [];
      return [info.primary, ...(info.fallbacks||[])].filter(Boolean);
    }

    function updateSceneNavButtons() {
      if (!prevSceneBtn || !nextSceneBtn) return;
      const has = sceneDirectoryList.length > 1 && selectedSceneDirectory;
      prevSceneBtn.classList.toggle('is-visible', has); nextSceneBtn.classList.toggle('is-visible', has);
    }

    async function handleSceneSelection(dirUrl, previewCandidates = null, requestId = null) {
      const norm = normalizeDirectoryUrl(dirUrl); if (!norm || norm === '/') return;
      const rid = requestId ?? (++sceneSelectionRequestId);
      setSceneSwitching(true); selectedSceneDirectory = norm; applySceneMusic(norm); updateSceneNavButtons();
      setViewerSceneTitle(getDirectoryDisplayName(norm)); syncScenePreviewSelection();
      const candidates = Array.isArray(previewCandidates) && previewCandidates.length > 0 ? previewCandidates : getScenePreviewCandidatesForDirectory(norm);
      try {
        await loadSceneByDirectory(norm, { viewerPreviewCandidates: candidates, selectionRequestId: rid });
      } finally { if (rid === sceneSelectionRequestId) { setSceneSwitching(false); updateSceneNavButtons(); } }
    }

    async function switchSceneByOffset(offset) {
      if (sceneDirectoryList.length < 2 || !selectedSceneDirectory) return;
      const idx = sceneDirectoryList.indexOf(selectedSceneDirectory);
      const next = ((idx + offset) % sceneDirectoryList.length + sceneDirectoryList.length) % sceneDirectoryList.length;
      await handleSceneSelection(sceneDirectoryList[next], getScenePreviewCandidatesForDirectory(sceneDirectoryList[next]));
    }
    prevSceneBtn?.addEventListener('click', () => switchSceneByOffset(-1));
    nextSceneBtn?.addEventListener('click', () => switchSceneByOffset(1));

    async function discoverSubdirectories() {
      const catalog = await loadSceneCatalog();
      const names = Object.keys(catalog);
      const pinned = '网课';
      return names.sort((a, b) => { if (a === pinned && b !== pinned) return -1; if (b === pinned && a !== pinned) return 1; return 0; });
    }

    async function setScenePreviewCards(baseDir, directories) {
      if (!scenePreviewGridEl) return;
      if (!Array.isArray(directories) || !directories.length) { sceneDirectoryList = []; updateSceneNavButtons(); setScenePreviewStatus(t('noScenePreviews')); return; }
      const normBase = normalizeDirectoryUrl(baseDir);
      scenePreviewGridEl.innerHTML = '';
      scenePreviewByDirectory.clear();
      sceneDirectoryList = directories.map(n => normalizeDirectoryUrl(`${normBase}${n}/`));
      for (const name of directories) {
        const fullDir = normalizeDirectoryUrl(`${normBase}${name}/`);
        const previewInfo = getScenePreviewInfo(name);
        scenePreviewByDirectory.set(fullDir, previewInfo);
        const displayName = localizeSceneName(name);
        const card = document.createElement('button'); card.type = 'button'; card.className = 'scene-card'; card.dataset.dir = fullDir; card.title = fullDir;
        const thumb = document.createElement('div'); thumb.className = 'scene-card-thumb';
        const image = document.createElement('img'); image.alt = `${displayName} preview`; image.loading = 'lazy'; image.decoding = 'async';
        image.onerror = () => { image.remove(); if (!thumb.querySelector('.scene-card-thumb-fallback')) { const fb = document.createElement('span'); fb.className = 'scene-card-thumb-fallback'; fb.textContent = t('noPreview'); thumb.appendChild(fb); } };
        image.src = previewInfo.primary; thumb.appendChild(image);
        const title = document.createElement('span'); title.className = 'scene-card-title'; title.textContent = displayName;
        card.appendChild(thumb); card.appendChild(title);
        card.addEventListener('click', async () => {
          if (card.classList.contains('is-loading')) return;
          const rid = ++sceneSelectionRequestId; card.classList.add('is-loading');
          try { await handleSceneSelection(fullDir, [previewInfo.primary], rid); } finally { if (rid === sceneSelectionRequestId) card.classList.remove('is-loading'); }
        });
        scenePreviewGridEl.appendChild(card);
      }
      syncScenePreviewSelection(); updateSceneNavButtons();
    }

    async function refreshDirectoryDropdown() {
      setScenePreviewStatus(t('loadingScenePreviews'));
      try {
        const dirs = await discoverSubdirectories();
        await setScenePreviewCards('/', dirs);
      } catch (e) {
        console.error('Directory discovery failed:', e);
        setScenePreviewStatus(t('scenePreviewsUnavailable'));
      }
    }

    // ── Cache All ────────────────────────────────────────────────────────
    async function cacheAllScenes() {
      const dirs = await discoverSubdirectories();
      const targets = dirs.map(name => normalizeDirectoryUrl(`/${name}/`));
      if (!targets.length) { setCacheButtonState({ label: t('noScenesFound'), progress: 0, disabled: false }); return; }
      setCacheButtonState({ label: t('cachingProgress', { done: 0, total: targets.length }), progress: 0, disabled: true, isCaching: true });
      let done = 0;
      await runConcurrentTasks(targets.length, 2, async (i) => {
        try {
          const norm = targets[i]; const urls = await discoverSplatFiles(norm);
          if (urls.length) { const fl = createSceneFramesFromUrls(urls); await runConcurrentTasks(fl.length, 2, async (j) => { await ensureFrameBytes(j, fl); }); sceneCache.set(getSceneCacheKey(norm), { dir: norm, frames: fl }); }
        } catch (e) { console.warn('Cache scene failed:', e); }
      }, (completed) => { done = completed; setCacheButtonState({ label: t('cachingProgress', { done, total: targets.length }), progress: done / targets.length * 100, disabled: true, isCaching: true }); });
      cacheButtonIdleLabel = t('cachedProgress', { done, total: targets.length });
      setCacheButtonState({ label: cacheButtonIdleLabel, progress: 100, disabled: false });
    }

    cacheAllBtnEl?.addEventListener('click', () => cacheAllScenes());

    // ── Render Loop ──────────────────────────────────────────────────────
    let lastTime = null, xrElapsedMs = 0, xrLastTs = 0, xrClockInit = false;

    app.on('update', (dt) => {
      const nowMs = performance.now();
      const gd = app.graphicsDevice;
      let renderW = gd.width, renderH = gd.height;

      if (!isVrActive) {
        const width = frameEl.clientWidth;
        const height = frameEl.clientHeight;
        if (width <= 0 || height <= 0) { app.renderNextFrame = false; return; }
        if (canvasEl.width !== width || canvasEl.height !== height) {
          app.resizeCanvas(width, height);
        }
        renderW = width;
        renderH = height;
      }
      app.renderNextFrame = true;

      // FPS tracking
      const instantFps = dt > 0 ? 1 / dt : 60;
      if (debugSmoothedFps == null) debugSmoothedFps = instantFps;
      else debugSmoothedFps += (instantFps - debugSmoothedFps) * 0.15;

      const fovDeg = Math.round(cameraEntity.camera.fov);

      if (debugVisible && nowMs - debugLastUpdateMs >= 1000) {
        debugLastUpdateMs = nowMs;
        const fpsText = Math.round(debugSmoothedFps);
        if (debugFpsEl) debugFpsEl.textContent = `FPS: ${fpsText}`;
        if (debugResEl) debugResEl.textContent = `RES: ${renderW}\u00d7${renderH}`;
        if (debugFovEl) debugFovEl.textContent = `FOV: ${fovDeg}\u00b0`;
        if (isVrActive) {
          drawVrDebugHud(fpsText, renderW, renderH, fovDeg);
        }
      }

      // VR debug HUD visibility
      if (isVrActive) {
        if (debugVisible) {
          const hudW = 0.32, hudH = 0.15, hudPad = 0.05;
          vrDebugHud.setLocalPosition(
            vrWinW / 2 - hudW / 2 - hudPad,
            -(vrWinH / 2) + hudH / 2 + hudPad,
            -VR_FRAME_DIST + 0.01
          );
          vrDebugHud.setLocalEulerAngles(90, 0, 0);
          if (!vrDebugHud.enabled) vrDebugHud.enabled = true;
        } else {
          if (vrDebugHud.enabled) vrDebugHud.enabled = false;
        }
      } else {
        if (vrDebugHud.enabled) vrDebugHud.enabled = false;
      }

      // VR frame initialization & playback
      if (isVrActive) {
        if (!vrFrameInitialized) {
          vrInitWaitFrames++;
          if (vrInitWaitFrames >= 5) {
            const camPos = cameraEntity.getPosition();
            vrFrameGroup.setPosition(camPos.x, camPos.y, camPos.z);
            vrFrameGroup.setEulerAngles(0, 0, 0);
            localFrame.setPosition(camPos.x, camPos.y, camPos.z);
            fitVrWindowToSplat();
            vrFrameInitialized = true;
            pendingVrRefit = false;
          }
        } else if (pendingVrRefit) {
          fitVrWindowToSplat();
          pendingVrRefit = false;
        }
        if (isPlaying && frames.length > 0 && !isCaching) {
          if (!xrClockInit) { xrClockInit = true; xrLastTs = nowMs; xrElapsedMs = 0; }
          else { xrElapsedMs += Math.max(0, Math.min(250, nowMs - xrLastTs)); xrLastTs = nowMs; }
          const delay = getNextFrameDelayMs(currentIndex, frames);
          if (!isLoadingFrame && xrElapsedMs >= delay) { xrElapsedMs -= delay; nextFrame().catch(() => {}); }
        } else { xrClockInit = false; }
      }
    });

    // ── Start ────────────────────────────────────────────────────────────
    app.start();
    setupVR();
    refreshDirectoryDropdown();
    setCacheButtonState({ label: cacheButtonIdleLabel, progress: 0, disabled: false });
    applyOrbit();

    // Auto-load from URL param
    const splatURL = params.get('url');
    if (splatURL) {
      switchToFrameList(createSceneFramesFromUrls([splatURL]));
      setViewerSceneTitle(splatURL.split('/').pop());
    }
  </script>
</body>
</html>
